  text: 欽定四庫全書子部十
  hash: sha256:6558828ce7672044657017b2bb9c6172233a999f18551baa91b8fd0e67ea1b4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0069_WYG_000-1a, image: WYG0858/WYG0858-0295a.png}
body:
  text: 義府雜家類二雜考之屬提要臣等謹案義府二卷國朝黄生撰生字扶孟歙縣諸生江南通志稱其棄舉子業一意著述有詩文若干卷今其集未見此書皆考証劄記之文上卷論經下卷論諸史諸子諸集附以趙明誠金石録洪适隷釋酈道元水經注所載古碑陶𢎞景周子良㝠通記訓詁以别教之書綴之卷末示外之之意焉生於古音古訓皆考究淹通引據精確不為無稽臆度之談如據説文辨周禮㲝毨正賈公彦丁度之誤引賈誼論陳琳檄証尚書漂杵為漂滷引爾雅證禮記鄭注烹魚去乙之誤引吕覽證朱襮非朱領引檀弓彌年為木証勃鞮為披引左傳及詩序證檀弓請庚之庚訓道路引唐書廉訪證周官六計之廉訓察引吳越春秋證鄂不即鄂跗引左傳證出於其類之出訓産引周禮載師閭師證夫布里布為二事引詩王風證孟子施施引左傳劉子語訓司中引繫辭證信信當讀申引禮記引兑命解行路兑矣當訓説引漢書證志微噍殺當為纖微憔悴引周頌爾雅証鄭衆解牘應雅之訛引爾雅証終軍許慎解豹文䑕之所以異引後漢書李膺傳証師古解軒中之訛引孝經疏證後漢書辜較估較辜𣙜酤𣙜之義引史記貨殖傳證刁悍當為雕悍引潛夫論證闗龍即豢龍引莊子證列子蕉鹿之蕉為樵引世説注證茗柯即酩酊皆根柢訓典鑿鑿可憑至於引莊子斷在溝中解斷斷引王莽傳謂青蠅蒼蠅當作䵷引國策解氓為流民引易竒偶證竒貨間有穿鑿附㑹又哉才通用引顔真卿碑不引考古圖所許通用引顔師古漢書注不引世説九徳引三國志注不引國語登時引集異記不引焦仲卿妻詩亦有失之睂睫之前者然小小疏舛不足為累雖篇帙無多而可取者要不在方以智通雅下也乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4223540f366cf0eaed84ed6a8a04ad58b5f459b6c001a891fa6249bf6eec70e1
