body:
  text: 義府卷上歙縣黃生撰疇咨書堯典疇殊由切咨若時登庸疇古音近誰故古謂誰為疇誰疇音皆如殊誰之入聲為孰故後又謂誰為孰疇誰孰總一音之轉韓愈墓銘粳稻盈疇上叶禁絶浮屠即此音也釐降書堯典釐降二女于溈汭嬪于虞孔傳謂舜能以義理降下二女之心則于溈汭三字為贅設矣此專欲表舜之德然不知古書固無贅設字也蔡傳以為治裝下嫁語若近俚反得事實史五帝紀易飭下字此亦主堯言然下有帝曰欽哉字欽即飭也在璿璣玉衡書舜典在璿璣玉衡在之入聲為察古四聲未定故借在為察非以察訓在也六宗書舜典六宗諸儒之説不一安國以四時寒暑三辰水旱當之此本於祭法然祭法自泰壇至四坎壇凡九名又不合六宗之數要不可強解流放竄殛書舜典流放竄殛馬融訓殛為誅似鯀獨入死刑夫三苗惡浮于鯀罪不及戮而崇伯獨膺大辟惡能咸服天下哉孔傳總訓流放竄殛為誅則是誅罰之意非死刑也史五帝紀敘此事于各句下云以變北狄以變南蠻以變西戎以變東夷謂使居裔以變其風俗雖經無明文然史家增此語真可謂得聖人之意者矣且使鯀果駢首其子孫決不敢以之配天于南郊據祭法郊鯀之辭則將以刑夭之鬼對越上帝有是理哉此非細故不可以不辨殳斨伯與書舜典注疏以殳斨伯與為二人朱虎熊羆亦然朱虎熊羆當從注疏為二殳斨伯與當從蔡傳為三洚水書大禹謨洚水警余洚有四音當以胡江切為正蓋此音近洪孟子云浲水者洪水也所以通古今之語也五辰書臯陶謨撫于五辰五行之精上為五星五辰即五星也五行旺于四時故謂四時為五辰天明畏書臯陶謨天明畏自我民明威畏即古威字示人以畏則平聲人望而畏則去聲後平聲者借用威字故去聲者遂專為畏字此處一義分二文乃傳寫之訛也今文並作明威是光天之下書益稷光天之下言凡為天光所覆之處蔡傳連帝字讀下謂帝德光輝非是慚德口實書仲虺之誥慚德猶云昏德逸德暴德比德韓愈謂德有凶吉是也其所慚者即恐貽來世以口實耳孔傳慚德不及古非是口實謂有所藉以為辭也表正萬邦書同前表者使人望之以為歸正者使人擬之以為的二字兩意庸蜀羌髳書牧誓及庸蜀羌髳微盧彭濮人蔡傳言八國近周西都素受約束故特稱之今考八國逺在巴蜀江漢之間與周都殊遼絶服役之説恐未然按春秋將卑師少稱人此諸國或君不自至故稱人以别之六極書洪範六極一曰凶短折橫死曰凶不及下夀曰短三殤曰折凶短折考終與夀之反疾與憂康寧之反貧富之反惡與弱攸好德之反惡者自暴弱者自棄也攸好德在人為協極在天為錫福惡與弱在人為罹咎在天為用威此即栽培傾覆之理蓋攸好德者善有所必彰惡有所必疸故在嚮用威用之中舉其本以見福極之所從來也元孫某書金滕惟爾元孫某諱名曰某始于此武成曰有道曽孫周王發亦告神之辭彼不諱而此諱者彼係武王自讀祝詞此則史代公祝故孔云臣諱君也小腆書大誥殷小腆腆與㥏同慙也小腆猶言小醜敬寡屬婦書梓材至于敬寡至于屬婦按爾雅妾婦之賤者謂之屬婦屬逮也逮婦之名言其微也又孔叢子引書吕刑哀敬折獄敬作矜此敬寡亦疑是矜字矜寡即鰥寡古音近通用經營書召誥厥既得卜則經營徑直為經周回為營謂相步其基址也觀逸遊田書無逸無淫于觀于逸于遊于田以事曰觀如公如齊觀社之類以地曰遊以獸曰田廢務曰逸咸戒于王書立政用咸戒于王曰王左右常伯常任準人綴衣虎賁蔡云周公率羣臣進戒于王此本王肅説孔云周公以立政之事皆戒于王此解近而未盡史言周公臚舉諸官戒王知恤官不止此五職苐從省文舉尊以見卑常伯常任凖人舉親以見疏綴衣虎賁而諸官總以咸字括之耳三宅三俊書同前三俊傳者謂儲養待用他日次補三宅不識此種人作何安置恐無此理疑即三宅之僚屬耳冢宰宗伯書周官六卿惟冢宰宗伯不以司名者冢宰無所不司宗伯典天地神祗之祀不敢言司也顧命書以顧命名顧眷顧也命大臣輔嗣主鄭重而眷顧之也鄭氏以為臨死回顧而發命陋甚鋭書同前一人冕執鋭説文作鈗羽敏切即引此文按説文序云其引書即孔氏壁中書然今世所行今文古文並作鋭即此可知孔氏書為後人傳寫多所改易而今文奧澀古文平易之疑可釋然矣伯夷降典書吕刑伯夷降典折民惟刑孔云伯夷降典禮于民而斷之以刑按篇中訓刑止監伯夷不及臯陶疑伯夷先曽為司徒降典即敷教兼行士師之職唐虞之刑疑伯夷所制故欲監其播刑之迪後二官既分而伯夷又復遷為秩宗也若蔡氏言降天地人之三禮以折民之邪妄夫事神何職而以獄吏兼之不祥孰大焉其誤審矣下文云士制百姓于刑之中以教祗德此指臯陶其居職當在伯夷之後而刑始為專官雖名掌刑猶以德教為本故舜云以弼五教也仡仡勇夫書秦誓仡仡勇夫仡許乙魚乙五匆三切堅挺之貌公羊傳仡乎從乎趙盾而入放乎堂下而立壯士之狀可想矣屹音逆山貌詩皇矣崇墉仡仡當作屹借用仡耳二字皆宜從五忽切音兀始可因聲以知意也便辟書冏命無以巧言令色便辟側媚孔傳便辟足恭蔡傳便者順人之所欲辟者辟人之所惡論語師也辟馬曰子張才髙過人失在邪辟文過朱注習于容止少誠實友便辟馬曰巧辟人之所忌以求容媚朱注習於威儀而不直孟子便嬖不足使令于前朱注近習嬖幸之人按便辟字始見尚書繼見論語孟子孟作便嬖當即一義然諸家解説多不同今按便者順易之意故有習義但辟字頗難解余謂辟當與襞積之襞音壁同謂儀節過繁如衣之襞積也如此則曰足恭曰威儀曰容止皆可通矣足恭之人必為人所喜故轉為嬖幸之嬖古但作辟通借用耳馬解辟人所忌蔡解辟人所惡皆未然師也辟馬作邪僻之僻益逺矣􅂒毛説文引書鳥獸氄毛作􅂒毛而尹人勇二切鄭注周禮司裘仲秋鳥獸㲝毨㲝即􅂒字之誤疏直音毛非也書文仲秋毛毨仲冬􅂒毛鄭引釋仲秋獻良裘王乃行羽物此兼詞耳本注仲秋鳩化為鷹仲春鷹化為鳩順其始殺與其將止而大班羽物蓋鳥獸毛至冬益豐厚可用故鄭云然經言仲秋未必以秋為限也後人疑本釋仲秋不當牽仲冬為説故書㲝為㲝即㲝音毛以就尚書鳥獸毛毨之文此昧理之甚者集韻因收㲝字與毛重文韻會亦仍其失凡後世俗字日增皆由輯字書者胸無涇渭止務博收故也尚書通行本皆作氄毛音周禮者或不知鄭從古本又字誤為㲝故昧其音斷斷書秦誓斷斷猗無他技按莊子青黃而文之其斷在溝中截木曰斷徒管切謂其所截曰斷都管切凡治木者必截其本在溝中以無用而棄之也書言此臣無他技能若木本無所可用故以斷斷形之血流漂杵周書泰誓血流漂杵賈誼過秦論作漂鹵陳琳􅊾文作漂櫓櫓鹵同大盾也二語皆本周書以理推之櫓者軍中所宜有杵非軍中所宜有也豫因悟杵即古櫓字蓋古杵字本單作午加木為大盾之杵郎古切諧午敞呂切聲穿母諧來母詳見諧聲譜後借午敞吕切為午未之午疑古切又借杵郎古切為春杵之杵敞吕切因續制櫓字以代之通用鹵惟周書尚作杵蓋舂杵亦器用之類注家依此作解所以存而不易若賈陳作櫓鹵是尚知杵即櫓字耳免禮檀弓檀弓免焉免者免冠而以布纒其頭也舊音問按問當作謨忿切始得其聲吾鄉呼問如悶正合古音如楚夫人鄧曼之音萬亦當作莫飯切爾雅之孟諸周禮謂之望諸望亦莫浪切吾鄉作此音皆古音也何居禮同檀弓曰何居舊音姬與詩小雅夜如何其書微子若之何其皆當讀基字濁音吾鄉有此音音在基其之間蓋語辭之有音無字者有音無字例見字詁伯邑考禮同文王舍伯邑考而立武王注以為文王長子余意為文王適孫以上下文皆有其孫字映發之也後閲路史果云伯邑考文王適孫先君子禮同昔者子之先君子喪出母乎舊注指伯魚觀下文子之不使白也喪之何也句則先君子為孔子使其子喪出母明矣檀弓文簡多用吞吐朠帶之法呼禮同曽子聞之瞿然曰呼呼舊讀為吁非也按陽伯嵒九經補韻左傳文元年呼役夫呼音賀此亦當從其音復以矢禮同邾婁復之以矢蓋自戰於升陘始也鄭謂邾師雖勝死傷者多軍中無衣復者用矢此言未審招魂自是死者之親各以其衣招之豈得云無衣用矢也蓋邾人自矜戰勝目死者為勇故變衣用矢以象其武耳殆將病禮同夫子殆將病也將病者弟子之辭不敢斥言其死也小斂之奠禮同小斂之奠子遊曰於東方曽子曰於西方斂斯席矣小斂之在西方魯禮之未失也按帷堂小斂二事對舉記者特為變文故舊解多誤今依上條次其文云曽子曰小斂之奠於西方子遊曰小斂之奠於東方斂斯席矣小斂之奠在西方魯禮之未失也未之卜也禮同公曰未之卜也舊注謂卜國微末無勇夫馬驚敗績罪在御者於車右何與且去名而以氏呼其人書中無此例公蓋不欲直責賁父故託云未嘗卜之于神爾則瑗請前禮同蘧伯玉曰吾子樂之則瑗請前言文子以斯丘為樂將止死于此則已直舍之而去爾蓋戲之也人臣奉公守職或殉社稷或死封疆皆矢之有素豈可預為身後之計伯玉不欲直譏故以諧語調之問喪禮同有子問於曽子曰問喪去聲於夫子乎曰聞之矣舊讀問為聞與下聞字相應不知檀弓文法多簡曽子蓋云問則未也然而嘗聞之矣問當仍讀如字無其時禮同子思曰有其禮有其財無其時君子弗行也為父後者得為出母服或是殷制周時無之故云然乙禮內則魚去乙鄭注今東海鰫魚有骨名乙在頰旁狀如篆乙字食之鯁人不可出此説鑿甚凡骨皆能鯁何獨頰骨且禮經豈專為鰫魚戒耶按爾雅魚腸謂之乙內則當指此耳契濶今人謂久别曰契濶本詩邶風死生契濶之語按詩意死生與契濶並對言契合也濶離也死生契濶與子成説執子之手與子偕老言有生必有死有契必有濶此人事之不可保者然我與子必誓相偕老偕老即偕死所謂誓同生死也不斥言死故但云偕老此初時執子之手而言既有成説矣此倒敘文法詎意今之不然也故下章云于嗟濶兮不我活兮單舉濶與活義蓋可見活猶生也于嗟洵信也兮不我信申同兮言今者從軍之役我與室家有濶而已契無日也有死而已生無日也此互見文法是前日契濶之言果信而偕老之願則不得伸也今人通以契濶為隔遠之意又讀契為挈皆承詩注之誤鞮鞻周禮春官鞮鞻注音低屨氏掌外國之樂與其聲歌鄭注東方曰靺南方曰任西方曰侏離北方曰禁鄭云鞮鞮外國舞者所扉豫謂鞮鞻當音低婁反語即為兜離班固兩都賦作此字兜離轉音為侏離本書前云韎師掌教韎樂祭祀則帥其屬而舞之蓋韎師掌教舞鞮鞻氏兼教聲歌各舉一方為名互見之義也韎師有韎樂字故鄭不生異説不然又將以韎為服飾之屬矣鄭引外國之樂而不知鞮鞻即侏離者漢人未知翻紐之法故也提彌明左傳宣二年提彌明史記作示眯明索隱作祈彌明按提示祈三字皆當讀如匙追蠡孟子追蠡注音堆以為鐘紐未見所出焦淡園以為當作槌謂指其所槌擊之處趙希鵠洞天清録以為今畫家滴粉令凸起謂之追音堆謂鐘欵文追起處豫謂二説皆不似古人口語追當讀為隧古字音近通用按考工記鳬氏為鐘云云于上之攠謂之隧蓋其受擊之處窪然攠敝如地之有坎陷故謂之隧若用之日久則攠敝處皆有穿孔如蟲剝蝕故曰追蠡也疑易坤隂疑於陽疑當讀為擬蓋坤六以隂居上是僭擬於陽也韻會擬字注亦作疑引史蘇秦傳疑于王者他如國語范無宇云大都疑國大臣疑主韓非子內有疑妻之妾外有疑相之臣皆作此讀又檀弓曽子責子夏云使西河之民疑女于夫子謂言不稱師使人知有已而不知有夫子是以夫子自擬豈非罪乎吳澄亦有此説蒼蛙之聲詩齊風匪雞則鳴蒼蠅之聲焦淡園謂蠅字乃蛙字之誤誠然按顔之推家訓云王莽傳紫色蛙聲餘分閏位謂以偽亂真爾閲此益知班氏用事出毛詩無疑豫因悟小雅青蠅亦當為蛙字之誤其云止棘止樊止榛正合蛙所止之處若以為蠅殊乖物理易叶韻易剝之上九小人剝廬終不可用也與上文災尤載三韻不叶又豐之九三折其右肱終不可用也與上文災志事三韻不叶豫謂由字訓用若謂用為由叶音怡即可叶矣疑古用有由音臯比左傳莊十蒙臯比而先犯之杜注臯比音毗虎皮也疏樂記倒載干戈包以虎皮名之曰建櫜鄭以為兵甲之衣曰櫜或作臯按疏引此以解臯為虎皮而比字無釋豫謂比連也以虎皮連合縫之故謂之臯比朱晦菴張橫渠贊勇徹臯比是但知臯比為虎皮不知臯比乃虎皮所製之物豈可以之目講席乎楊升菴謂戴叔倫詩猊座翻蕭索臯比喜接連以臯比為講席唐世已然苐言古以虎皮包弓矢謂之櫜櫜即臯而不譏其用事之誤是升菴亦未晰臯比之義也縮縫或謂禮檀弓冠縮縫孟子自反而縮縮之訓直亦是古人反語豫謂此二字非但宜訓為直正當讀為直蓋古屋韻與錫職二韻多相通如矗字從三直其音則敕六切俶字從叔在屋韻則昌六切在錫韻則它歷切蹙字從戚其音則子六切戚字中又從叔即古菽字其音則式竹切幅字在屋韻音福在職韻音逼而堛愊福副拍逼切四字在職韻者俱諧畐古福字音謖式竹切乃諧職韻之畟古稷字愎弼力切乃諧屋韻之復古復字如此類者不一而足乃知縮字古本讀式次商次清次音與直字相近次商濁音故假借用之耳按焦氏易林利少囊縮與上得澤字叶此古讀縮為式之證糊口左傳隱十一年糊口于四方言不足于食僅給其口而已此莊公自謂不能和協其弟而使其在外求食以自給其口也説文錯本訓糊為寄食引左傳為證則于正考父鼎銘昭七年所謂饘於是鬻於是以糊余口者不可通矣疏云稠者曰麋當作糜淖者曰鬻糊饘是其别名將麋向口故曰以糊余口猶今人以粥向帛黏使相著謂之糊帛此説亦非黏􅀈之􅀈字從黍二字固有辨糊饘為鬻異名鬻乃食之薄者正父自謙茍以得食為幸與僅給其口意合寤生左傳隱元年莊公寤生驚薑氏故名曰寤生遂惡之杜云寤寐而莊公已生此説非也寤而已生此正産之極易者何為反驚而惡之豫謂寤當與牾通牾逆也凡生子首出為順足出為逆至有手及臀先出者此等皆不利于父母或其子不祥故世俗惡之莊公寤生是逆生也逆生則産必難其母之驚且惡也宜矣按風俗通云貌生而能開目視者曰寤生此亦一説又世亦有腄中生子者南燕録載慕容皓夫人晝寢生德左右以告方寤而起皓曰此兒易生似鄭莊公長必有大德遂以德為名觀此可見宇宙之大何所不有然皓以易生為喜益證薑氏之惡必以難産為驚矣杜預之注豫終不謂然焦氏筆乘載吳敬甫解與豫同但以寤生為遌生云遌逆也然遌乃送逆之逆非反逆之逆此又知其一不知其二者矣吳名元滿余同邑人所著有六書正義襮吕氏春秋忠亷篇狄入衛食懿公之肉舍肝宏演啼曰臣請為襮按襮當如古表字表外衣也宏演剖胸納公之肝言不忍使其暴露如以衣襲之也詩唐風素衣朱襮蒲沃切疑朱為表衣而素則其裏毛云領也諸侯繡黼丹朱中衣説文訓黼領亦引此詩按毛語出禮郊特牲彼文無襮字似不得引以為解且曰中衣則與宏演納肝之意相左又豈可言臣請為領乎敦丘􅎧都回切俗作堆小阜也敦古有􅎧音故爾雅丘一成曰敦丘注都昆切古今語轉謂􅎧為墩俗作此字故注但讀本音又玉敦之敦音對爾雅如覆敦者敦丘注音堆此則當音對或音頓詩衛風至于頓丘通借頓即此丘也疏以覆敦者音堆以頓丘釋丘一成者並誤畜君好字上聲音吼詳字詁去聲音獸古書或借用畜此一音之轉吕氏春秋引周書云民善之則畜也不善則讎也注畜好也孟子畜君者好君也此正訓畜為好通古今語耳注取止義是不明古人口語之過眕眕之忍切説文目有所限而止也畛為田界故從畛省為義左傳隱三憾而能眕言能自限止不為惡又爾雅釋言云眕重也杜注用其意不若説文義為長風馬牛左傳僖四楚子云唯是風馬牛不相及也言唯兩國比鄰或有馬牛風逸越境相責之事今地勢遼逺不虞何以見伐見小釁亦無何况大釁勃鞮左傳僖二十五寺人勃鞮注即寺人披按披即勃鞮二合音緩言之則曰勃鞮急言之則曰披由語有緩急非人有二名衛將軍文子名木檀弓作彌牟與此同不給則應左傳昭二十不給則應杜注所求不給則應之以罪非也給應皆供也急曰給緩曰應不給則應言緩急不能免其供也昧雉公羊傳襄二十七公子鱄云茍有履衛地食衛粟者昧雉被梘注昧割也時割雉為盟按昧之訓割他無所據愚謂昧雉猶死雉也雉死目瞑故曰昧雉封檀弓縣棺而封注讀為窆按周禮冢人作窆陸彼驗補鄧二反左傳昭十二作塴陸北鄧反徐甫贈反愚按補鄧北鄧甫贈並同音崩去聲封窆塴三字通用若從彼驗反則封塴字不可同一音矣食粥檀弓食粥音糜孟子饘粥之食並此音俗音之六切非請庚之檀弓請庚之庚道也注訓償未安左傳以塞夷庚詩序由庚萬物各由其道也申祥意謂既已犯人之禾請遂買此地闢為孔道買地意從下文映出蓋欲掩過以説如字於民子臯曉之以為買道而葬固所以恤民但以吾為邑長于此幸無得罪于上下斯可耳獨不思後此宰邑者難為繼乎蓋成民頑獷易玩其上治之者宜用威不宜用惠也哭則呼名兄死不衰孔子墮三都獨成不肯下此其頑梗難治之證先人之室檀弓有焚其先人之室三日哭此謂居室也前章先人之敝廬與此一義居室先人所傳宗廟先祖所依其遭變之禮宜不異故曰新宫火亦三日哭先儒並以先人之室為宗廟非也庶氏檀弓庶氏之母死何為哭于孔氏之廟乎庶氏猶他氏言出母既嫁是即他氏之母耳哭於廟非禮也先儒以庶為氏其義殊陋沐椁檀弓沐椁椁材光潔如沐此夫子以贈原壤者歌意正與此二字相映注訓沐為治謂夫子助之治椁恐於事理未安甬考工記鳬氏舞上謂之甬甬上謂之衡甬謂鐘至肩處有級而稍髙也甬道之義取此衡謂鐘上平處也注以二物為鐘柄誤循牆正考父鼎銘左昭七一命而僂再命而傴三命而俯循牆而走亦莫豫敢侮循牆而走指小兒之學步者雖學步小兒豫亦莫敢侮之此錯綜句法所謂三命滋益恭也舊注非宗宗尊古同音故注家即訓為尊書禋于六宗孔傳尊也穀梁以伯宗為伯尊賈逵以宗盟為尊盟皆因聲借用論語信近於義節文體如詩蓋復辱親宗兩兩叶韻考亭知此節之用韻而乃讀宗為族以叶復辱所謂強作解事者亷周禮天官以六計弊羣吏如亷善亷能之類此亷字作察字解正借作規古借用亷耳後世亷訪使之名取義于此今人通作貪亷之亷其解殊誤然貪亷二字亦有説亷非對貪而言乃對庸而言也蓋山石之有稜角者謂之亷故人之風采凝峻者以此為目孟子云頑夫亷石之無稜角者謂之頑石二字正是相反也注云頑者無知覺亷者有分辨是又牽察義為訓矣蹇蹇易蹇卦王臣蹇蹇匪躬之故言人臣履歷險難知有國而不知有身也自晉書王豹傳引作王臣謇謇字家遂訓謇為直言之貌與卦義相戾矣廣韻􅟌吃也􅟌難于言蹇難於行故取其字為意今引易而省作謇又與吃義相戾方舟禮大夫方舟謂兩船相併也今長年謂併船為幫船因悟古方字亦為幫音今猶存其音但昧其字耳古無庚青二韻凡韻中皆與陽韻通兼四聲未定故併亦呼為幫而併舟之併則專為方字逋忙切後借為四方字其音遂泯哉生明書武成哉生明顔魯公家廟碑作才生明此知古哉才二字本通用鄂不詩小雅鄂不韡韡不篆作象花蒂形即古柎字説文不字注誤韻會云柎或作不引詩鄂不韡韡鄭云承華者柎不當作柎柎鄂足也古聲不與柎同按鄭止知不音古同柎不知不即本古柎字顔公送劉太沖序云鄂不照乎棣華龍驥驤乎雲路此以不作柎字用也吳越春秋采葛歌葛不連蔓芬台台音怡古不字又一證束修論語自行束修以上吾未嘗無誨焉謂行檢束修飾之禮蓋十五入大學之年也家語本姓解凡所教誨束修以上三千餘人桓寬鹽鐵論余自結髮束修年十三幸得宿衛給事輦轂之下陳崇稱莽功德自初束修值世俗隆奢麗之時後漢書鄧太后詔故能束修不觸羅網伏湛傳自行束修訖無毁玷注年十五以上延篤傳吾自束修以來為人臣不陷于不忠為人子不陷于不孝注束帶修飾李固云王公束修厲節賈堅云吾束修自立君何忽忽相謂降耶馮衍説鮑永大將軍之事豈得圭璧其行束修其心而已哉注言不可空自清潔徒約束修身而已何充薦虞喜疏束修立德皓首不倦禰衡顔子碑在束修之齒入宣尼之室歷觀兩漢束修二字並如此用從心論語從心所欲不踰矩從當讀為縱白氏六帖柳子厚與楊誨之書王荆公進戒疏引此並作縱心蓋知古讀也孟子從耳目之欲此從字本一義亡之論語亡之命矣夫亡讀為無言病勢已極無所復之也漢書宣六王傳引作蔑矣夫知亡不音忘五十以學易論語五十以學易假年卒學恐歲之不吾與也然人情未至五十必不遽興此歎其為字誤審矣執禮論語詩書執禮皆雅言也詩書之言無所不通禮則各因其人如與人子則言事父之禮與人臣則言事君之禮各因其所執者為言故曰執禮雅頌得所論語吾自衛反魯然後樂正雅頌各得其所樂本無不正其不正者鄭衛之聲亂之也夫子入衛而聞其聲始知先王之樂久為時俗之樂所亂於是歸魯得以正其不正而雅頌始復其故焉得所者復其舊之謂也緣古樂沖淡人不喜聽故樂工雜以淫聲取娛俗耳聖人雅志復古心知其然又親聞桑濮之音始灼然雅俗之辨與太師共相訂正去俗還雅故曰自衛反魯然後樂正舊解略去首句本旨遂失衣裘異色論語緇衣羔裘素衣麑裘黃衣狐裘傳云五色比象昭其物也故古人雜施五采於服器必相間成文然後為致飾之道五色不宣不足悅于目猶五音均一不能諧於耳也若衣黑裘黑衣黃裘黃衣白裘白表裏如一何以相稱是以羔不必定黑麑不必定白鹿色斑駁故曰文鹿狐不必定黃語曰豐狐文豹豐亦文也玉藻狐白裘裼以錦衣狐青裘裼以玄綃衣麑裘裼以絞衣此衣裘異色之證自道論語子貢曰夫子自道也言夫子不欲言人不能但自道而已如此始為自責以勉人孔氏論語自孔氏有荷蕢過孔氏之門不稱孔子而稱孔氏氏猶家也因晨門荷蕢而言檀弓伯髙之喪孔氏之使者未至亦因伯高使而言又哭諸賜氏舍于子夏氏皆此義仲尼之徒孟子仲尼之徒徒猶屬也非師徒之徒篇中云聖人之徒舜之徒跖之徒皆此例觳觫孟子吾不忍其觳觫二字俱從角注恐懼貌無義此以意為訓耳疑觳觫角新生貌此牛必犢子故齊王謂其無罪就死地也唐皎然詩門前便使觳觫來徑以二字目牛得其解矣折枝陸筠翼折枝孟云折枝謂磬折腰肢也枝肢古字通用劉孝標廣絶交論匐匍逶迤折枝舐痔正用孟子語教玉人雕琢玉孟子則何以異于教玉人雕琢玉哉謂不使玉人盡其治玉之能但以己意授之舍學從我無異此也志至氣次孟志至焉氣次焉謂志之所至而氣從之也蘇子由孟子解作次舍之次是本義趙注為亞次之次朱因之並誤大全能用其力于仁節小注朱子云志在這裏氣便在這裏此正志至氣次之解不知本注何故不用至大至剛以直孟至大至剛以直趙注云此至大至剛正直之氣也程易傳云直方大孟子所謂至大至剛以直也按蘇老泉亦如此讀愚謂至大則無外至剛則無內凡物不剛則有隙可入至直則無前惟朱子以以直字屬下句云或問中語若屬上句則于剛字語意重復徒為贅賸此不審其字義爾出於其類孟出於其類拔乎其萃出猶産也左傳云我之自出是也此句承上類字轉下拔萃句非髙出之謂㕓孟㕓而不征㕓無夫里之布按古國都畫九區如井中宫室前朝後市朝則祖左而衽右庫藏官府之屬皆在焉市則商賈百貨皆在焉其餘以為民㕓此文前謂商所居之廛後謂民所居之㕓也夫里之布孟無夫里之布謂夫布里布也載師職宅不毛者有里布民無職事者出夫家之征又閭師職凡無職者出夫布二布並見周禮趙氏但取載師入注而遺閭師之文集注因之四書辨正以為朱子偶未深考遂以夫家之征當之不知朱本沿趙誤耳趙或以夫布即夫家之征故不另引然當體本文只以二布解之為是氓孟願為之氓謂來自他國者于文亡民為氓其意自顯書中願受一㕓而為氓又君之於氓也故周之皆此義集注但以民訓氓則何以讀國策之不憂民氓哉塗炭孟如以朝衣朝冠坐於塗炭趙訓炭為墨蓋泥墨皆易汙之物也余因悟商書民墜塗炭與此義同謂民為桀昏德所染汙耳孔傳作炭火解後世言天下之亂動云生靈塗炭皆承安國之誤如就見孟寡人如就見者也如猶宜也按左傳定八年然則如叛之又云不能如辭墨子今天下莫為義則子如勸我者也何為止我皆此義又左傳若愛重傷則如勿傷愛其二毛則如服焉失伍孟一日三失伍舊解喻失職頗不合于下文多字無義愚意持戟之士謂伍長也三失伍喪失伍中三人也軍法戰士失列伍長有罪意當時法亦如此故以為邑長致民死徙之喻得侍同朝孟得侍同朝甚喜孟子曽仕於齊齊王謙不言立乎本朝故但云同朝然先為客而後為臣故曰得侍云云若謂得侍左右已出望外又不鄙而與之同朝其為喜幸更何如彼一時此一時孟彼一時此一時也新安陳氏大全注云前日言不怨尤之時與今日所遇之時不同果爾則是言行不能相顧何足以為孟子要知不怨不尤二句本孔子之言而孟子嘗稱之集注亦云然充虞所云君子即孔子也故曰彼一時此一時意謂孔子之時如彼故可免於怨尤今之時如此雖欲不怨尤而不可得已民之為道孟民之為道言其固然之理人之有道言其當然之理聖人有憂之孟聖人有憂之有當讀為又與上堯獨憂之句血脈相通後邪説暴行有作集注云有讀為又古字通用朱能讀彼不能讀此者以上文先有邪説暴行又作故也有私龍斷焉有梏亡之矣亦有讀又以天下與人易孟以天下與人易為天下得人難堯舜一生憂民直至得人禪位其憂始釋故曰以天下與人易云云後漢李固與梁冀書引此二語云昔昌邑之立昏亂日滋非博陸忠勇延年奮發大漢之祀幾將傾矣觀此則知漢世原作此解又陳止齋有為天下得人者謂之仁論亦主禪位説衆楚人咻之孟衆楚人咻之或訓歡或訓笑皆未確咻與喣同虛主反口布氣也楚音衆則習染其氣也韻會詬字注以氣溫之也或作欨亦作咻毁瓦畫墁孟毁瓦畫墁如今人以瓦片畫牆壁為戲蓋指畫墁所用乃毁裂之瓦耳設言此人不足為功於我而亦志在得食將如之何注無功有害是直謂毁人之瓦矣人情斷斷所無者雖設喻亦必不作此語泄泄孟泄泄猶沓沓也按説文呭以制切多言也引詩無然呭呭又誻字注云本作沓語多沓沓也然則泄泄沓沓皆多言之意故曰言則非先王之道者猶沓沓也此以今語證古語使知詩人蓋指此輩按泄當即喋徒協切詩天之方蹶居月切本音自可相叶讀蹶為貴讀泄為曵皆注家之誤若以喋音讀孟子之泄泄與沓沓尤相近不待注而自明矣執熱孟引詩誰能執熱考詩鄭箋作執持熱物解趙注因之他注亦因之並誤執如執友之執執固持也執友者其交不能解執熱者其熱不可釋周興嗣千字文執熱願涼杜甫詩爾曹輕執熱皆得本意畢郢孟卒於畢郢郢當讀為程按路史云程王季之居在今咸陽故安陵亦在咸陽與畢陌接所謂畢程注引長安志孟子言文王卒於畢程今作郢其揆一也孟其揆一也揆古作所以度地之器也如今之量弓此揆字作實用言聖人雖有逺近先後之殊而其揆則歸於一也孔安國書傳敘其歸一揆與此施施從外來詩王風將其來施施毛傳難進之意鄭箋紆行之貌以詩注觀之則孟施施從外來形容齊人醉歸欹斜偃蹇之狀可掬矣趙注喜悅之意朱因之云喜悅自得之貌詳施字於喜義不近及觀韻會記字釋云自得之意乃知趙讀施為訑故有此訓施施用詩訓自佳不必借訑義也孝子之心不若是恝孟公明髙以孝子之心為不若是恝若是恝三字指下文所言子職已盡父母自不我愛於我何與於我何哉猶俗云與我何干也語氣悻悻恝然無復怨慕之意孝子負罪引慝之心決不若是語勢與豫豈若是小丈夫然哉句同鬱陶孟鬱陶思君爾陶者閉穴以熄火氣鬱於內則不復然以比人憂思則氣不得伸也象憂亦憂象喜亦喜孟象憂亦憂象喜亦喜王觀濤翼注謂泛就平日休戚相關言是也余謂唯平日如此故今日如此象憂見鬱陶一語其喜在言外舜喜見臣庶一語其憂在言外以象憂見舜憂以舜喜見象喜此互見文法要知舜之於弟直以赤子視之啼笑皆真憂喜無間外丙二年仲壬四年孟外丙二年仲壬四年趙氏謂外丙立二年仲壬立四年程子伊川謂湯崩時外丙方二歲仲壬方四歲按竹書史記帝王世紀尚書蔡傳鄭樵通志略郝京山九經解王觀濤翼注皆如趙説孔安國書傳司馬溫公稽古録李槃世史類編薛方山人物考皆如程説余謂即以本書證之確知為立不久蓋此段本明伊尹不有天下之事意言湯崩之後伊尹數奉幼君屢立屢仆可取之矣而終不取知天意之有在也若云幼不可立則於本節之旨無關何必敘及梏亡孟有梏亡之矣即書費誓牿牛馬牿字孔傳云牿牢之牛馬是也本作牿此作梏或字訛或借用耳梏亡承牛羊又從而牧意來與亦猶斧斤之于木數句相應書又云無敢傷牿經以牿字代牛馬字此以梏字代牛羊字正用尚書文法機變孟為機變之巧者無所用恥焉機變如偃師倡者之類此承上章由而不知言人不知道則不可以為人此如木偶耳目手足皆能運動其實非人故借此人指點言今世有為機變之巧者是人決不知恥蓋方以其巧自矜又孰知其終不可以為人也哉容説孟事是君則為容説者也與下以安社稷為悅悅字一意言心所慊者在此也事君人者茍得君而事心無它念惟以容身保位為主王深甫云事君者以見容於吾君為悅此解得之棄井孟掘井九軔而不及泉猶為棄井棄井猶廢井言虛廢前功也以小信大孟責仲子亡親戚君臣上下為不義之大者而讓國之義眇乎其小蓋衆人但知讓國之為義不知敦倫之為義故以蔑倫之子而競以義稱則是以其小者信其大者矣此章只以義字擒翻仲子不必增出亷節等字憎兹多口孟不理於口又曰憎兹多口理分辨也不理於口言毁者多不勝分辨也憎惡也多口謂瑣瑣致辨也區區止以口舌弭謗即謗為之止壬猶憎之蓋彼以口來我以口應是非彼之多口乃我之多口耳業已自命為士雖見愠於人何傷彼二聖當時亦不免為人所愠何嘗一語自理哉注殊聵聵朱亦因趙之誤斯與論語中有斯字無此字斯者此字之轉音而借用者也有與字今作歟無耶字耶者與字之轉音而借用者也又五經四子中並無耶字鶂鶂孟子惡用是鶂鶂者為哉注鶂魚乙切與逆同音此誤也鵝豈作如此聲乎豫謂當音捱去聲蓋鶂與倪同從兒莊子和以天倪注音涯則鶂字亦可呼捱去矣捱去正鵝聲也素位中庸素其位而行素乃絲之未染者他語借用素字猶俗云本色本分之謂如素心素志素位素履皆此義也又素有白義白者空有質而無色故事之有其名而無其實與有其實而無其名者皆曰素如素餐素王素封則此義也又如素交素識素常之素則有始義蓋素者色之始也此本其初而言猶云非一日之故也少艾古外與艾同音吾鄉至今作此音故謂美男為少艾孟子慕少艾趙注但以為美好朱注云楚辭戰國䇿幼艾義與此同亦例引之耳其義故未晰也按國䇿趙牟謂趙王王不以豫臣乃與幼艾蓋謂其幸臣建信君國語云國君好艾則大夫殆好內則適子殆以艾與內對舉可證艾即外矣又曲禮五十曰艾方言東齊魯衛之間凡尊老謂之傛或謂之艾則艾本老稱今反訓美好思之似誤蒲盧中庸地道敏樹夫政也者蒲盧也陸佃埤雅以為瓠之細腰者得之以為蒲葦者固非以為土蜂者尤謬解頥新語因爾雅螺螺蒲盧之文遂以蒲盧為細腰土蜂蓋蜂以細腰故亦有蒲盧之名此處則指地之所植者言耳蒲葦雖易生苐不須種植瓠是種植所生之物始與上文樹字相應故沈括説亦似是而非好書惟口出好興戎好去聲即邦君為兩君之好好字與戎字相對好猶親也戎猶讐也易曰君子出其言善則千里之外應之出其言不善則千里之外違之即出好興戎之義舊注好訓善似未審裼玉藻云裘之裼也見美也服之襲也充美也注袒而有衣曰裼則似今之背心以加於裘外故仍見裘之美論語緇衣羔裘節集注衣以裼裘欲其相稱蓋是衣與裘一色則裘之美不為衣所掩也若服之襲則是以全衣加其外其色即不顯余向未明裼衣之制故緇衣節不作衣裘一色解今覩玉藻注始知裼是露臂則是裘外加半臂審矣司中周禮有司中司命二神始不解司中之義偶讀老子萬物負陰而抱陽沖氣以為和乃知中即指此沖氣而言沖氣以為和謂隂陽兩相和合不偏不雜人得之以生此所以為萬物之靈中庸喜怒哀樂之未發意與老子合古人不分性命為二物故通謂之中書所謂和衷降衷左氏所謂天誘其衷皆指此中衷古通用又左傳載劉子云民受天地之中以生所謂命也此即天命謂性之意謂性為中又檀弓云文子其中退然如不勝衣此亦謂性為中注訓中為身非也又國語左執鬼中右執殤宫此中字正與司中之中合蓋司中司命二神即今俗所謂南斗注生北斗注死是也司中主生司命主死故並祀之左執右執云者猶言生殺在其柄如司中司命之神凡大人小兒之命皆得主之耳本注解中為身亦誤又孫思邈詩南斗度名北斗落籍玩殤宫二字恐當時已有此語從容今俗語事之需遲為從容此二字本出禮記人多忽之按學記云善待問者如叩鐘叩之小者則小鳴叩之大者則大鳴待其從容然後盡其聲注從讀如富父舂戈之舂舂容重撞擊也疏每一舂而為一容必待盡其聲此見凡俗語未嘗無來處也三代稱帝三代天子之號稱王然夏自帝啓以下俱曰帝某商則易稱帝乙歸妹書稱自成湯至于帝乙初疑其説後讀禮記曲禮云措之廟立之主曰帝始解女左傳昭元年醫和云女陽物而晦時淫則生內熱惑蠱之疾杜注女常隨男故言陽物家道常在夜故言晦時按此之所謂女即倉公傳之所謂內也交媾乃陽氣用事故曰陽物注意未明又云是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不佑此本四字成句二句成韻室疾言疾之所宿聚也疏云是謂近女室説此病之由疾如蠱言此疾似蠱疾也句讀皆不知其可笑如此欒考工記鳬氏兩欒謂之銑欒鐘口兩角也鄭注故書欒作樂杜子春云當為欒按角古音盧谷切與樂歷各切音相近故通借樂又禮喪大記鬊瓜實于緑中則以角為緑此亦其類今之欒字乃杜子春所改實無義也終葵考工記玉人大圭杼上終葵首注齊人謂槌為終葵圭首六寸為槌以下殺杼閷也終葵為椎于杼上按如此則其形當如豫考説文斜字訓杼也則杼即斜義又終葵二字即椎字之切音急言之曰椎緩言之則曰終葵椎當作錐或古字通用所謂杼上終葵首者謂斜鋭其上首作錐形如博雅不知終葵之義别作柊楑字云柊楑槌也此妄作之謬槌椎義同又按説文璋訓琰上為圭半圭為璋此證益明亹亹易繫辭成天下之亹亹徐鉉云古無亹字當作娓娓不知古無亹字固有舋字舋音門與娓音同切明毋娓古音近來吾鄉謂尾為米與古音合古人字多假借故即舋字轉為娓音其義則易之所謂舋舋即詩之所謂勉勉也娓勉一聲之轉大雅勉勉我王韓詩作亹亹文王荀子作亹亹我王可證二字本一義後人不知舋之可轉音娓故妄加亠頭不知舋舋之即勉勉雖訓為不倦之意亦臆度之詞耳巂曲禮立視五巂注音攜規也輪一周為一規按巂規當即一音古字通用蜀子規鳥一名巂可證攜從巂諧聲亦如栝之諧古紅之諧工旱之諧干皆以見母轉匣母也蒸書益稷蒸民乃粒詩大雅天生蒸民蒸字相承訓衆然以古韻求之蒸當即讀為衆平聲釋典衆生並作此讀以音相近而借用蓋古蒸與東冬通為一韻故也眣公羊傳文七年眣晉大夫與公盟本注伊乙反又大結反孫氏説文丑栗切黃氏韻會敕栗切按昳謂以目使人當與日昳之昳國䇿髙誘注讀為逸同意昳為日斜眣則以目斜視示意可知孫黃音誤爾雅漢藝文志爾雅張晏注爾近也雅正也自此諸家釋爾雅義多以近正為説豫觀漢人常用此二字如指詔書云文章爾雅訓辭深厚儒林傳言符命云其文爾雅依託皆為作説豈皆近正之謂耶按説文爾字訓云麗爾舊忍里切詳聲意當泥禮切俗作你字反合古音猶靡麗也詳爾雅主説詩而作猶云詩正而葩也凡文章以爾雅言者皆謂靡麗而典雅也充其義則爾文也雅質也爾華也雅實也揚雄言詩人之賦麗以則爾雅之謂也楊用修亦以爾雅為麗則斯左傳襄三使臣斯司馬注斯此也訓太易當讀為厮役之厮謙言為役於司馬耳衽禮檀弓衽每束一注衽小要古腰字也木為之衣之縫合處曰衽以小要聨合棺與蓋之處故亦名衽徐文長青藤路史云衽形如今之銀則子俗呼法焉作餅定樣漢時呼為小要按此字當作鋌説文訓銅鐵朴也今傾銀槽俗謂銀為一錠蓋鋌音之訛其形中細則子蓋肖其形棺蓋合縫之具或古省用廷字傳寫誤作衽耳臧左文十八毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶德有常無赦又云盜賊藏姦為凶德藏字杜不注疏主為藏匿罪人之名按藏乃臧之誤也古藏贓字皆作臧後人傳寫誤加草耳考國語正作臧掩賊為臧言得賊之物而隱庇其人猶今窩主之謂故曰主臧之名賴姦之用盜賊臧姦俱為凶德取本文讀之其意自顯作臧則藏贓二義皆具作藏則義不備而意不明矣又此數句左氏皆以意釋字賊從則從戈戈有殘毁之意故曰毁則為賊臧從戕從臣臣即賊也而在中掩之義也故曰掩賊為臧竊財賄盜之小者故於文涎皿為盜涎古涎字貪欲之意盜國家之重器則非小盜可比故加以大姦之名臧字之義左氏已自為注腳何煩加草乎信信信古通借為申字易繫辭屈信相感孟子屈而不信是也按詩周頌有客信信毛注再宿曰信豫謂當讀為申申之訓重即再宿義注家知訓為再宿而不知讀為申何與兌兌古悅字禮學記引尚書説命作兌是也詩大雅綿柞棫拔矣行道兌陸吐外徒外二切毛云成蹊也矣言道路通則柞棫之木挺拔而生行者皆喜兌也又大雅皇矣柞棫斯拔松柏斯兊陸徒外切毛易直也兊即茂盛之意漢武故事云體常壯悅體盛曰壯色盛曰悅松柏之兌亦此義注中音釋並誤戴侗亦辨其非男角女羈禮內則男角女羈男則橫分兩髻如角故曰角女則兩髻一前一後如馬首故曰羈鄭注午達曰羈橫曰旁縱曰午此釋其意不釋其字耳孔説非郁夷詩四牡周道倭遲韓嬰作郁夷豫謂郁當音倭即逶字遲當音夷即迤字古字音相近而通用也臯陶庭堅左傳文五年秋楚人滅六冬又滅蓼臧文仲曰臯陶庭堅不祀忽諸杜以庭堅即臯陶之字故謂六蓼皆臯陶後然古人口語無既舉其名復舉其字之理羅泌路史辨臯陶為少昊四世孫庭堅則髙陽氏之子六臯陶後蓼庭堅後此為得之又史夏本紀封臯陶之後於英六索隱引地理志安國六縣偃師所封國英地闕不知所在正義謂英即蓼此承杜預之訛而附會之耳僖十七年齊人為徐伐英氏杜謂楚與國亦不注所在豫謂英即偃二字音相近而轉舜妃女英大戴記作女匽此亦音之轉也故臯陶之後有英氏又有偃氏六今六安州英疑即今英山縣紡國語晉語紡執而紡於庭之槐按紡當讀為繃悲崩切祊音烹趽音崩皆此聲古字通用説文繃束也今俗綁字補頂切即繃音之轉因轉音故字從而變耳紡於庭槐即綁縛之義植木護本曰援謝靈運詩題南山樹園激流植援束之於樹其形似之故叔向嘲語云求繫既繫求援既援韋注釋紡為縣此臆説耳噍殺禮記樂記志微噍殺之音作而民思憂漢書禮樂志作纖微憔悴之音按噍殺當即讀為憔悴故漢人用其本字耳志注疑作急急微亦不成語乃知古本作纖微古樂之義禮樂記弦匏笙簧合守拊鼓始奏以文復亂以武治亂以相訊疾以雅聲遲曰文聲數曰武鄭注文謂鼓武謂金非也復謂往復亂謂繁亂復在中亂在末相去聲雅皆樂器名疾即亂訊即治互言之也此言古樂所奏皆有名義文有綏柔之義武有戡定之義相有輔助之義雅有反正之義古人每事皆有義可稱故曰君子於是語於是道古修身及家均平天下也禮記及樂書史記二注並不達此義夫夫禮記檀弓夫夫也當作夫人也按李斯書嶧山碑大夫二字只作夫古文尚簡夫中已具大字故點注以識之檀弓之夫夫恐古文止作兩疊注上人字而後人誤以為重文也董逌書跋説亦知此匹馬周書文侯之命馬四匹公羊傳僖三十三匹馬觭輪無反者古人駕馬或四或六皆用偶數故數馬以匹一匹當是兩馬四匹則二乘也其曰匹馬亦猶匹夫匹婦本因偶得名稱謂既久即單舉亦可為匹耳又按漢人始用五馬詩良馬五之蓋變文叶韻非事實也流矢檀弓圉人浴馬有流矢在白肉按流矢謂矢去而鏃仍著肉中故待浴馬方見今人襲用流矢失其義矣士士者少男之稱易大過老婦得其士夫此本義也又壯字壻字皆從士意益可見從十從一十指其年一指其零數也説文引孔子推十合一為士言能綜萬理于一原也義雖精而近鑿操縵禮學記不學操縵不能安絃注以縵為琴瑟之弦非也按周禮磬師奏縵樂注謂雅聲之和樂者也疏云雜弄調和按繒無文曰縵此云雅聲云雜弄皆謂無文耳學記之操縵即今之和絃敔圉雅周禮小師注柷如漆桶中有椎敔木虎也郭注爾雅蔡注尚書皆本此為説又笙師舂牘應雅以教祴樂先鄭云舂牘以竹大五六寸長七尺短者一二尺其端有兩孔髤畫以兩手築地應長六尺五寸其中有椎雅狀如漆桶而弇口大二圍長五尺六寸以羊韋挽之有兩組疏畫後鄭云牘應雅教其舂者謂以築地賓醉而出奏械夏以此三器築地為之行節按先鄭所説三器狀不甚殊且應大似後鄭所説之柷周頌應田縣鼓後鄭既以應為小鼓爾雅亦云然無由此應别是一物徒取其築地為節何必用三器若是之不憚煩乎愚意應即周頌之應牘即柷而雅即敔爾牘徒谷切之為柷昌六切亦如田之為陳休之為屠休屠音厨隊之為墜雅之為敔亦如迓之為迎為逆語有輕重其實一義騶牙之騶吾允吾之為鉛牙古字多可通用如此則牘應雅三器各得其所矣敔周頌作圉樂記訊疾以雅叶旅鼓武語古鼨鼠豹文爾雅豹文鼮鼠郭注鼠文彩如豹者漢武帝得此鼠孝亷即終軍知之云出爾雅許氏説文鼨豹文鼠也與郭説異按本書豹文二字在鼨鼠之下鼮鼠之上郭以為鼮鼠是以二字下屬也許以為鼨鼠是以二字上屬也然詳前後文勢當以上屬為是郭因終對而誤説文不誤也獄訟周禮大司冦以兩造禁民訟入束矢於朝然後聽之鄭注訟謂以財貨相告者造至也不至不入束矢則是自服不直者也古者一弓百矢束矢其百箇與以兩劑禁民獄入鈞金三日然後聽之鄭注獄謂相告以罪名者劑今劵書也不劵書不入金則是亦自服不直者也按爭財為訟爭罪為獄經無明文鄭特臆為之説夫五刑之屬三千凡入於司冦者無大小皆有罪名何獨以財貨别於罪名之外乎詩誰謂女無家何以速我訟此爭婚也非爭財也士師之職凡以財獄訟者正之以傳别約劑此以獄訟兼言是貨財亦曰獄也左傳僖二十八衛侯與元咺訟是罪名亦曰訟也疏亦引此而曲為鄭解云此相對之法若散文則通愚謂爭財亦罪名之一不得單舉與罪名相對也詳周禮之意當是小罪曰訟大罪曰獄鄭云三日乃治之重刑也疏云獄事重於訟事故鄭云重刑此言得之但不宜以貨財為輕以罪名為重耳小罪可以立遣故兩造具而即聽之大罪必須審慎故使之先立劵書不致辭有反覆又遲之三日猶冀其情可平也罪之大者必再三審讞其獄始成故又謂獄未成曰訟訟已成曰獄衛侯與元咺訟公羊閔元年謂歸獄僕人鄭扈樂是此義也凡以財獄訟者謂凡以貨財之獄來訟者此兼舉為辭也詩之二章云何以速我獄此對舉為辭也具此二解則禮與詩與傳之文皆不相剌戾矣周禮言禁者禁之未然之前蓋愚民雖有爭心或以惜費而止故以束矢鈞金之法禁之所以止其來非欲罔之利也後世月周禮為衰世之書皆由不善讀此等故束矢當止十矢鄭云百矢蓋已自為疑辭矣齵考工記云察其災蚤不齵五溝切則輪雖敝不匡齵齒參差也今謂木器不平整曰齵音敖語之轉也鳳凰來儀書益稷鳳凰來儀儀匹也謂雙下之也詩實維我儀毛云匹也國語丹朱馮身以儀之注言馮依其身而匹偶之易太極生兩儀儀亦匹義亂訊誶樂之卒章為亂即繁音促節之意楚辭亂曰猶存古名賈誼弔屈原賦史作訊曰班作誶音碎曰樂記治亂以相訊疾以雅則訊或亦亂之别名養求左傳昭二十私欲養求不給則應養謂口體之奉求謂玩好之類皆私欲也給應皆供也急曰給緩曰應此言寵妾寵臣私取於民者緩急皆不能免於供杜注所求不給則應之以罪非也義府卷上
