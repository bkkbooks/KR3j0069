body:
  text: 義府卷下歙縣黄生著數竒史記李廣傳數竒竒者對偶之稱後漢桓譚傳云陛下聽納讖記其事雖有時合譬猶卜數竒偶之類蓋古時有此占法以偶為吉竒為㓙霍去病傳諸將畱落不偶亦此意也李廣數擊匈奴輒無功不得封侯此其祿命之薄使然故上以為數竒不使當單于爾本注數士角反不讀為術數之數則竒字作何解宋景文筆記云數竒注切為所角反後得江南本乃所具反由是復觀顔注乃顔破朔從所具反竒貨史記吕不韋云此奇貨可居也竒當音竒偶之竒單也獨也言此貨有一無二我得居之以獲重利也猶今市人言此缺貨可以囤積之謂若作竒異之竒便不類賈人語鄭莊史鄭當時傳上曰吾聞鄭莊行千里不齎糧治行者何也鄭莊句行千里句不齎糧句莊糧叶韻八字乃諺語葢時人因莊交遊之廣故有此目而人主亦素聞之故云幕漢書西域傳罽賓國錢文為騎馬幕為人面如淳音漫非也按今戲錢者名錢面為字錢背為幕正作幕本音釋名幕絡也在表之稱耐漢書髙帝紀應劭注輕罪不至于髠完其耏鬢故曰耐此說非也耐正留髪去須鬢之名吾鄉婦人以綫繳面毛者謂之耐面其名猶沿古義因此足訂應誤約法三章楊用脩讀漢書髙帝紀與父老約法三章耳以約字句絶謂後人作連讀者誤然考之紀末云初順民心作三章之約又刑法志云約法三章知班史本不以約字為句也王男馮婦男子也王男婦人也二名相反可為的對王男順帝乳母見後漢書飲羽史記叙李廣射石事云中石没鏃不如西京雜記云矢乃飲羽飲字竒甚然本出吕氏春秋韓詩外傳及劉向說苑並因之然吕作養由基韓劉又作熊渠子蓋文士傅會之談耳緯書稱孔子後漢習酺傳稱孔子云吐珠于澤誰能不含注引春秋保乾圖云云蓋讖緯之書皆託云孔子所作東漢之世盛行故不出書名第云孔子而已許慎説文常引孔子之言如狗者叩也之類他書不見疑亦出于纖緯諸于繡􅜎後漢書光武紀冠幘而服婦人衣諸于繡􅜎注字書無􅜎字司馬彪續漢書作䘿並音其勿反按本書五行志亦載此事云皆幘而衣婦人衣繡擁镼此镼即􅜎之誤注並不解而前注第云或繡下有擁字而已以意度之字既從髮疑是婦人衣領領後承髮故惟婦人則加繡以飾之若男子而服此是服妖矣􅜎字字書亦無又按通雅云廣記載韓晉見少年單練􅜎即段成式之單練􅜎與镼同謂今之半臂也予謂此字當作䘿蓋㭾從屈有短義半臂之式必短也今作􅜎者意廣記與成式喜用僻字耶溷軒後漢李膺傳羊元羣罷北海郡贜罪狼籍郡舎溷軒有竒巧載之以歸注溷軒厠屋也按前外戚傳帝起更衣子夫侍尚衣軒中得幸此即所謂溷軒也釋名云厠或曰溷言溷濁也或曰軒前有伏似殿軒也師古不知此義乃以軒車解之不思天子車駕當在外庭豈子夫所得至又更換衣裳豈必在車中此師古並不識更衣之義蓋貴者入厠出必更衣如王敦在石崇家入厠之事可證當時即謂入厠曰更衣此是文言漢書中說此者非一如竇嬰傳坐乃起更衣稍稍引去師古注凡久坐者皆起更衣以其寒煖或變誤矣又通鑑隋文帝所寵陳夫人旦出更衣為太子所逼又宋人海陵三仙傳獨處一室卧起方丈間食酒肉如平時而無更衣之處此蓋言得道者雖飲食而無漏也皆用漢書之意也更衣古時入厠名更衣因即以名其小憩之處如東方朔傳右内史發民共待㑹所後乃私置更衣從宣曲以南十二所中休更衣投宿諸宫又前楊敞傳延年起至更衣敞夫人云云延年從更衣還云云師古注古者延賓必有更衣之處此亦臆語後百官志注司徒府殿西王侯以下更衣並存朝㑹之地貴者必各置更衣避私褻也祭祀志注皇帝出即更衣中皆言此舎所以便其更衣也臨軒人主親試貢士曰臨軒䇿士臨軒字出後漢書李膺傳帝詔膺入殿御親臨軒詰以不先請便加誅辟之意又張奐傳青蛇見御座軒前注軒殿檻闌板也蓋堂陛之間近簷之處兩邊有闌楯謂之軒如車之軒耳面縳史記宋世家載微子肉袒面縳解者以為反縳向後僅見其面此說陋甚凡縳者必反接所以防他變若微子則是自為出降之禮但縳手而不反接故以面字著之此見古人用字之妙從來為陋解所晦可恨也又項羽紀顧見漢騎司馬吕馬童曰若非吾故人乎吕馬童面之指王翳曰此項王也解者訓面為背亦誤詳上下文語意項王此時雖在圍中然去馬童尚逺故曰顧見云云時項王一行尚有二十餘騎先尚未辨孰為項王因其呼而諦視之然後指示王翳云云面之即諦視之謂或謂古人多反語故謂背為面如治之為亂馴之為擾香之為臭其例可見此蓋昧于字義之俗說古治字本作亂馴擾之字本作臭為香氣之總名其臭腐之字本作殠後人傳寫訛謬如此豈古人之意哉若面之訓背乃偭字耳且此時漢視羽如几肉矣尚何所諱而背之言乎結髪結髪猶今人攏頭之謂漢書云廣結髮與匈奴大小七十餘戰蘇武詩結髪為夫妻恩愛兩不疑蓋皆指其初攏頭時而言今人以結髪之義單屬夫妻誤也正先秦時趙髙用事有正先者未刺髙而死髙威自此成故秦之亂正先趣之見京房傳子謂此人正類天啓中楊左諸公惜後世罕知其名馯臂子宏仲尼弟子傳孔子傳易于商瞿瞿傳楚人馯臂子宏馯姓臂名子宏字也師古云漢書荀子皆作子弓此云子宏誤予謂宏當讀為肱蓋宏旁有􅖱此古肱字以其名臂故知字當為肱也肱與弓音相近故或呼為子弓顔監知子宏之誤不知子宏子弓皆非其本字耳物故漢書霍去病傳士馬物故又霍光傳卒有物故師古云物無也故事也人死無所復能為事也釋名云人死諸物皆朽故也按二解皆非物猶事也不正言死但諱云事故猶孟子所謂大故耳窶數東方朔云著樹為寄生盆下為窶數師古注窶數戴器也以盆物戴于頭者以窶數薦之或疑窶數與寄生截然二物何以朔語如此蓋窶數常在盆下今寄生亦覆盆下故朔先謬言窶數以紿郭舎人舎人遂謂朔射不中朔乃云云非真謂寄生為窶數也辜較孝經蓋天子之孝蓋諸侯之孝注蓋猶畧也疏云辜較之辭因悟前後漢書諸所謂辜較估較辜𣙜酤𣙜辜酤皆讀為估𣙜讀為𣙜皆即此義蓋估計較量之謂注疏釋蓋字猶云大畧大較如此耳商賈殖貨必估計較量而後賣買諸書辜𣙜皆謂勢家貴戚漁獵百姓奪商賈之利耳儲胥漢武帝因秦林光宫増置通天迎風儲胥露寒諸名皆似臺榭之類無屋壁者長楊賦木擁槍纍以為儲胥師古注儲峙也胥須也以木擁槍此槍當即今戧字音去聲及纍繩連結以為儲胥言有儲蓄以待所須也按此似今木柵之類儲胥猶扶疏目其形也李商隠籌筆驛詩風雲猶為護儲胥此指行營之寨柵通可指儲胥髙似孫緯略以儲胥為宫館之名固矣又魏略李勝為河南太守郡㕔事前屠蘇壞應璩與韋仲將書屠蘇發撤蕭子雲雪賦没屠蘇之髙影廣雅屠蘇平屋也按屠蘇即儲胥之轉聲漢書休屠王屠音厨又姑蘇古名姑胥此可知矣平屋之訓似臆續考三輔黄圖武帝作迎風館于甘泉後加露寒儲胥二館阿家阿翁郭汾陽子曖尚昇平公主琴瑟不調汾陽拘曖詣朝堂待罪上召而慰之曰諺云不癡不聾不作阿家阿翁小兒女子閨幃之言大臣安用聽右見唐趙璘因話錄家即曹大家之家阿家阿翁謂公姥二人温公通鑑去一阿字作阿家翁失古人口語矣君公古婦人稱夫之父為章漢書景十三王傳望卿歌云背尊章陳琳飲馬長城窟行云善侍新姑章俗作嫜初未悉其義因閱淮南子覽㝠篇云君公知其盜也逐而去之乃悟章即君公二字合語古音公如光如世母為嬸舅母為妗之類新婦漢以還呼子婦為新婦後漢何進傳張讓向子婦叩頭云老臣得罪當與新婦俱歸私門世說王渾妻鍾氏云若使新婦得配參軍生兒當不啻如此此自稱新婦涼張駿時童謠云劉新婦簸石新婦炊北齊時童謠云寄書與婦母好看新婦子蓋必當時謂婦初來者為新婦習之既久此稱遂不復改耳又古者謂子為息息之訓生也國䇿左師觸讋云老臣賤息舒祺梁武帝長安有狹邪行云大息組絪緼中息佩陸離小息尚清綺總轡遊南皮今俗謂子婦為媳婦此必因息謬加女旁耳又或單呼為媳益可笑也吾鄉俚語至今尚稱新婦反存古意召平史記索隠注云廣陵人召平東陵侯召平與齊相召平皆别似一人三輔黄圖獨謂廣陵人召平即東陵侯種𤓰者不知何據考後漢郡國志廣陵有東陵亭豈即召平所封與兩萬石君萬石君有兩一石奮人多知之一馮揚人不知也按後漢馮勤傳云曽祖父揚宣帝時為宏農太守有八子皆為二千石趙魏間榮之號為萬石君焉則此亦西漢時人也寄名今俗有生子不利而寄名于他人者其事已起漢世按後漢何后紀后生子辯養于史道人家號曰史侯注云靈帝數失子不敢正名寄養道人史子眇家即其事也按道人二字亦始此注謂道術之人今俗亦有寄名于僧道者柴虒甘泉賦柴虒參差魚頡而鳥胻師古注柴虒參差不齊貌柴初蟻反虒音豸按柴虒即詩邶風差池其羽之差池古字通用師古音誤觀頡䀪亦即取其頡杭可見柴虒當即讀差池也又文選作偨傂漢書止作柴虒加人者俗増字也蕃嚮路史云蕃漢縣屬魯國劭音皮魯國記云陳子游為魯國相太尉陳蕃子也國人為諱改曰皮按黨錮傳八厨有魯國蕃嚮注亦音皮嚮魯國人當亦為陳諱故韻府羣玉乃以八厨厨字音皮收入四支韻也元元國䇿蘇秦書子元元又漢書文帝紀元元者安所託命哉元元謂百姓字當音云與老子萬物芸芸同義後漢八及目海内才珍世孔元元與珍叶知古本作此音沈韻十三元或譏其亂雜不知當時元自音云耳丁壯漢書髙帝紀丁壯苦軍旅古丁當同音丁壯言其年正當壯時也後語省遂單呼為丁故民年二十成丁李陵答蘇武書丁年奉使正謂年在二十左右也女子封侯呂嬃之為臨光侯也蕭何夫人同之為酇侯也以吕氏稱制故然實髙祖為之作俑按功臣表奚涓死事無子髙祖乃封其母疵為魯侯又楚漢春秋云髙祖封許負為鳴雌亭侯此不見正史不可信幼眇漢元帝紀分刌節度窮極幼眇中山王傳毎聞幼眇之音注作要妙老子是謂要妙北史魏世祖紀方寸玉印有三字鳥文要妙竒巧上林賦俛杳眇而無見衞恒四體書勢序杳眇邪趣不方不圓按本字當作幺紗陸機賦絃幺徽急注幺小也說文紗絲急也絃小而急則其聲幽細哀切動人漢書借用幼眇若老子之要妙則又借作深微之義自漢以來又借為美好之稱因改其字从女作妙其實古無此字老子之妙必後人所改也易繫辭妙萬物而為言亦深微義非美好義今本作妙古文定不爾枚乘七發此亦天下之至言妙道漢人用妙字始此涏漢書趙后傳燕句燕句尾涏涏堂練切今誤本作涎非涏从廷乃得聲韻會涏字引漢書此語則知當時本固不誤也水滴謂之涏此形容小鳥張尾之狀極肖字書訓光澤貌亦屬臆說要害後漢書來歙傳中臣要害猶今言致命傷言身中𦂳要處犯之必為害也借地當敵衝者謂之要害舊解于我為要于彼為害欠確乾没漢書張湯傳乾没注得利為乾失利為没非也言以公家財物入已如水之淹物沈没無迹也不水而没故曰乾與陸沈意同僊僊詩賓之初筵屢舞僊僊注軒舉貌按與莊子僊僊乎歸矣說苑辯哉士乎僊僊者乎漢書司馬相如傳僊僊有凌雲之氣皆當即讀為軒蓋僊讀作仙人之說上古所無始見荘列之書曰列仙山澤之儒此蓋借僊字軒音為先亦如釋氏借佛字詩佛時仔肩即古弼字轉音為弗也焦澹園以僊僊有凌雲之氣當讀飄飄此亦强說里所漢書張良傳父去里所復還師古曰行一里許而還又疏廣傳問金餘尚有㡬所師古曰猶言㡬許愚按所許又同從數字所主反而來蓋約計其數如此耳周書君奭多歴年所此用所之自隋煬帝詩聞名爾許時猶如許時也昭明太子詩念人一去許多時則竟似近人俚語矣握齱史記酈生傳握齱好苛禮按握指相聚也齱齒相切也故借為拘局纖瑣之意通作􅐅齪漢書申屠嘉傳􅐅􅐅亷謹史作娖娖史記貨殖傳俗好儒備于禮故其民􅐅􅐅皆一義也俗語謂垢穢之類為齷齪此蓋因纖瑣為辭然變握作齷則因下譌上也中􅣂湯左相仲虺史記殷本紀作中􅣂終風詩虺虺其雷疑􅣂其本字雷聲倐忽徧逺近故从多體㑹意當與豗同音呼回切扈扈字書加竹作簄漁具蓋編竹以禁魚者漢質帝目梁冀為䟦扈將軍取譬于此以魚之彊有力者能跋出扈外也以禁魚使不得過故有止義左傳昭十七九扈氏為九農正扈民無淫是也天子從駕謂之扈從亦取呵止行人之義上林賦扈從横行師古注殊謬又左傳宣十二屈蕩户之漢書王嘉傳坐户殿門失闌免與此同義户即扈也貫以緡穿錢曰貫故有相續不絶之義前谷永傳以次貫行後東平王蒼傳孝明皇帝大孝無違奉承貫行是也相續而行則有習熟之義詩魏風三歲貫女孟子我不貫與小人乘前賈誼傳習貫如自然是也錢滿一貫則不可益故有盈滿之義書秦誓商罪貫盈韓非子吾恐其以我滿貫是也又鄉藉謂之貫言編貫于版藉之中也若論語之仍舊貫此即續行習貫之意注訓貫為事太就便矣僕射僕射射音夜漢官儀云僕主也古者重武事每官必有主射課督之關中語轉為此音此說未然按孔衍史記注云僕射小官扶掖左右者也予因此乃悟射字當讀為扶掖之掖音亦僕附也見詩景命有僕注以其附近人主備扶掖之用故曰僕射員數既多後遂命之分領諸事故有謁者僕射冗從僕射城門僕射等名此既在人主左右其後漸掌機密自六朝來遂以尚書僕射為宰相之稱與侍中一官皆以至賤為至貴名位倒置極矣督亢史荆軻傳獻燕督亢之地圖註以為地名非也地圖當盡全燕豈得僅獻一處蓋此時秦已有天下大半非僅前時割地以講之比故若為舉版圖以内附者督亢猶言首尾人身督脈在尾閭穴亢為咽喉故首尾謂之督亢言盡燕地之所至為圖也註謂督亢坡在范陽縣東南又按水經注有督亢溝督亢澤涿志有督亢亭督亢陌予謂此皆後人因二字以名其處耳路史舜紀云歴陽之耕侵畔乃徃耕焉田父推畔爭以督亢授此督亢乃疆界之意益證史之非地名矣朐忍漢書地理志巴郡朐忍縣師古音劬後漢郡國志亦作朐忍惟吳漢傳作朐䏰注音劬忍又引十三州志音春閏詳此為蟲名本方言無字故第作朐忍其䏰从肉傍乃因朐字誤加耳十三州志音譌後漢注兩存之尚得闕疑之意徐鉉竟誤作􅓃字附入說文又誤從孫氏作􅓃如順切潤䏰尺尹切蠢以劬忍作蠢潤已誤又倒作潤蠢更誤按嘉話錄唐劉餗云瓊州地名朐䏰朐䏰是蚯蚓也上音屈下音忍據此則蚯蚓即朐忍之轉音當以師古注為定審矣又楊升菴載李巽巖朐䏰辯引杜氏通典作􅓃䏰音潤蠢則知徐鉉之誤蓋本於此乃楊反以杜氏之形聲為正而謂師古誤音則真莽浪也諸如集韻音蠢忍戴侗音瞬忍張位音瞿閏無一是者總由不識此蟲即蚯蚓故鄭重漢書王莽傳非天所以鄭重降符命之意也師古云鄭重猶頻煩也予謂顔訓是也然得其意而未得其聲蓋鄭重即申重平聲之轉去者爾三國志夷翟傳國家哀汝故鄭重賜汝好物顔氏家訓吾亦不能鄭重聊舉近世切要以啓寤汝耳此用鄭重字皆與顔註合至白居易詩千里故人心鄭重又交情鄭重金相似筆談沈括他日試使人通鄭重則閉門不納此又用為珍重之意非本指也商中漢書郊祀志作建章宫云云其西則商中數十里虎圏如淳曰商中商廷也師古曰商金也於序在秋故謂西方之庭為商庭按此說似鑿三輔黄圖叙建章之制云其西則廣中殿受數萬人商中疑廣中之誤數見不鮮史陸賈傳數見不鮮四字似當時諺語無久慁公為也慁如今人言溷擾公則呼其子耳言人情久則生厭如物常見則不新父子間亦當相體故欲十日一更一歲中除徃來過他客之外率不過三數過其子以俗情論之五子輪值一歲止膳父三十日宜無厭倦之色矣尺布斗粟史淮南王傳一尺布尚可縫一斗粟尚可舂兄弟二人不相容其意蓋云貧民衣食不多尚可兄弟相共况以四海之大而不能容一弟乎鑿空漢張騫傳騫鑿空上聲諸後使徃者皆稱博望侯以為質于外國按鑿空與為質對質有物空無物言騫先無所因徃通諸國如即虛空而鑿之後使者皆藉騫為辭如有物以為質耳注並非欲得自便利漢書張敞傳使者奏敞賊殺不辜天子薄其罪欲令敞得自便利即先下敞前坐楊惲奏免為庶人敞即從闕下亡命漢法凡亡命者遇赦則可出故云欲令得自便利是不欲有司窮治前事先下免官之奏風使亡命也子舎漢書石奮傳入子舍竊問侍者取親中裙厠牏身自浣滌師古云諸子舍目其所居也若今言諸房按此說非也子舍猶子城子之為言小也此蓋侍者所居之室若建自入已舍則于下事義乖今文士用子舍字多承小顔之誤委裘漢書賈誼疏植遺腹朝委裘而天下不亂孟康曰委裘若容衣天子未坐朝事先帝裘衣也按古未有主幼不坐朝而虛設先帝衣裘以朝者孟說無稽此言幼君不勝禮服坐朝則委裘於地耳所倉公傳史不為愛公所所之為言許也俗謂不多曰㡬許緣倉公更欲受方公孫光曰我方盡矣不為愛公所言於公更不吝惜纖毫也又周亞夫傳帝曰此非不足公所乎時賜食不置箸亞夫心不平顧尚席取箸帝視而笑云云不足猶不重也意謂此主者偶忘置箸耳不然不至輕慢如許也又佞幸傳漢上有酒所從容謂賢云云此所字亦不多之意猶俗云微有酒意也不自喜外戚世家史壹何不自喜酈生傳史足下何不自喜魏其武安侯列傳史君侯何不自喜按諸云不自喜即今俗云好不思量之意必當時方言如此世家酈傳並不注惟魏其傳蘇林注何不自解釋為喜樂索隠引師古云何不自謙遜為可喜之事二解俱牽强且于世家酈傳所言不可通底律書史氐正義丁禮反者言萬物皆至也此以至訓氐今尚書中底訓至亦當音丁禮反註音旨似誤乖剌漢書劉向傳朝臣舛午膠戾乖剌郎達切此皆言羣情違背之意乖剌即乖戾聲之轉言戾又言剌者以聲異而互見也諸妄校尉漢書李廣傳諸妄校尉以下張晏注妄猶凡也車千秋傳同漢置丞相非用賢也妄一男子上書即得之矣本書不注按此亦凡義妄古音茫去聲聲近漫莫慢切汗漫大貌故謂凡為妄史作諸部校尉此後人疑妄字為誤而改之若車傳不注則直以為誕妄之妄耳布衣昆弟漢本𫝊賈誼疏名雖為臣實皆有布衣昆弟之心慮無不帝制而天子自為者言布衣昆弟諸事平等不若天子諸侯雖為兄弟禮制懸絶故此諸王每事欲與天子平等一如布衣之為兄弟也街居史記貨殖傳洛陽街居在齊秦楚趙之中說文街四通道洛陽四通諸國故曰街居云云註誤馬千匹又同橋姚致馬千匹匹耦也古以駕車兩服兩驂各自為耦故數馬以匹註數說並非涿居季漢書周羣傳昭烈戲作謔語嘲張裕多鬚云諸毛繞涿居乎當時語呼涿為督李卓吾自叙亦云人或呼卓吾或呼篤吾即此音又俗轉臀之入聲為督今猶有此語俗更作豚字此蓋以下體謔之也假葬季漢書曹休傳擔喪假葬假葬即今之攢墳也自行迎除舎漢景十三王傳自行迎除舎言躬自除治其第舎且行迎之師古注非膝席史魏其傳避席伏離席而俯伏也膝席者膝不離席但直其身如今之長跪也云云史汲黯傳吾欲云云即下欲效唐虞之治之語也記者只從汲黯口中叙出于帝語遂以二字括之省文法也䕃室史滑稽列傳佳哉漆城蕩蕩㓂來不能上即欲就之易為漆耳顧難為䕃室此滑稽之談言欲成漆城為漆固多猶或可得顧漆必得䕃始乾恐無此大屋覆之耳千金之子史貨殖列傳千金之子不死于市死市大辟之罪也言其富可以脫死罪也隙隴蜀之貨史同秦文孝繆居雍隙隴蜀之貨物而多賈隙謂出一孔也隴蜀貨物徃來必經于雍故云云徐廣以隙字屬上句誤雕悍少慮史同民雕悍少慮雕與彫通樸之反也今俗用刁字貪賈三之史同節駔儈貪賈三之亷賈五之駔儈平定價直而取其酬大率以三五為節謂于百分之中或取三或取五也貪賈嗇故少取亷賈寛故多取此人一歲所入亦可比千金之家舊註並誤富者必用竒勝史同富者必用竒勝即竒貨可居之竒音基猶今人言獨行生意也賈不論鉅細但守常業而不變久自致富視他人之數數徙業者我實用竒勝矣故曰此皆誠壹之所致嶽嶽漢書朱雲傳五鹿嶽嶽朱雲折其角此因其姓嘲之言鹿角嶽嶽為雲所折也招魂云土伯九約其角觺觺魚乙切嶽即觺之外聲丘嫂漢書楚元王傳過其丘嫂食注丘大也長嫂之稱也此訓未然丘空也謂無兄空有嫂也蓋是時髙祖長兄已沒故孟康注史記西方有亡女壻曰丘壻丘空也畫一史曺相國世家蕭何為法顜音較若畫一小顔云言其法度整齊也此解殊未明晰按古人計事必用手指畫條其事件使此事利害劃然謂之畫一如畱侯世家張良藉箸而籌張晏云借所食之箸用以指畫是也下文歴數其不可者七爾時每數一事必用箸記一畫此乃所謂畫一也若百姓所歌蓋言何法令至明條目粲列有似于畫一爾徒言其整齊何所置顜若二字哉後來惟歐陽修所進劄子前言其大綱繼言臣有起請事件謹畫一如後遂每件提起另書各以一字冠之結尾右件㡬事云云又言如臣畫一所陳云云必當時章奏之式例如此畫一二字猶存古人之意今人遇開欵件亦云一某事一某事却不知名為畫一猶豫猶豫猶容與也容與者閒適之貌猶豫者遲疑之情字本無義以聲取之爾俗人妄生解說謂獸性多疑此何異以蹲鴟為􅏜鳥哉考諸傳記惟文帝紀作猶豫未定楊敞傳猶與無決陳湯傳將卒猶與後漢來歙伏隆傳皆作冘即尤字與未決蓋以聲狀意初無一定之字妄解獸名者眼縫自未開爾醖藉漢書匡張孔馬傳贊服儒衣冠傳先王語其醖藉可也醖謂醇藉謂厚言不露丰稜也後人用醖藉二字本此如𤣥何漢書揚雄傳今學者有祿利然尚不能明易又如𤣥何言國家設明經之科以利祿懷天下之士然治易者尚苦其義難明孰肯覃精于𤣥自占史平凖書雖無市籍各以其物自占率緡錢二千而一算索隠引郭璞云占自隱度也謂各自隠度其財物多少為文簿送之官也音之贍反詳此言官欲算商因無市籍可稽賈居貨故有市籍商行販故無市籍故自其自度貨物之直口陳于官而筭之郭本解占卜之占謂術者自隠度其卦象以言禍福索隠引之以釋此占字是矣何復臆說為文簿送之官不知本言以意自度故曰隠度蓋對官口陳如此故謂之自占若為文簿送官豈得云自隠度哉又音以之贍反益與本義相矛盾矣漢書陳遵傳遵憑几口占書吏且省官事書數百封謂遵不自書以辭口授書吏用口占字隠度之意益明主計史張丞相列傳遷為計相一月更以列侯為主計四歲是時蕭何為相國而張蒼乃自秦時為柱下史明習天下圖書計籍又善用算律歴故令蒼以列侯居相府領主郡國上計者時止立一相不欲分何權故為計相之名以别之若更以列侯為主計則並計相之名亦除去蓋有職事而無官位故曰以列侯居相府其實用蒼佐何而蒼于何為先進又不可為何之佐此髙祖權宜用人之法如淳司馬貞皆以主計為官名全失本文之意矣少學大學漢書食貨志八歲入小學云云十五入大學云云其有秀異者移鄉學句于庠序庠序之異者移國學句于少學諸侯歲貢少學之異者于天子學于太學命曰造士云云按鄉學庠序之總名也國學少學之異名也對鄉學而言則曰國學對太學而言則曰少學所謂小學大學又與少學太學不同由此而後入鄉學則特家塾之名爾錢制班史食貨志叙太公圜法云錢圜函方函舌也上圜而下長其長處于舌故曰函方孟康注外圜内方非叙周景王錢制云肉好皆有周郭此則外圜内方之形肉謂質好謂孔古好音如吼吼即孔也周郭謂邊道也韋昭注非五榖不為多又云姦錢日多五穀不為多言不禁私鑄則姦錢且多于五穀也師古注非諸賈人又云諸賈人未作貰貸賣史記脫此字買居邑貯積諸物及商以取利者按末作造作諸器物以賣者貰貸貸錢以取息者買賣居邑即坐賈商以取利即行商貯積諸物如今之囤户生分漢書地理志薄恩禮好生分分去聲生分乖戾之意謂心曲有彼此分界也今俗語猶如此舊注未是後云民以貪遴吝同爭訟生分為失其義一同若如舊注則不可通矣賦漢書藝文志不歌而誦謂之賦言不可被之聲音但可諷誦而已此所以雖出古詩之流而實與詩異派也沈沈史記陳涉世家夥涉之為王沈沈者沈讀為潭潭潭尊嚴之意夥頥甚辭也意謂涉與我故等夷爾今其為王何太尊嚴之甚守尚書令丞非史三王世家御史臣光守尚書令丞臣非下御史書到言按上言御史臣光守尚書令是光以御史行尚書令事故此奏狀但言御史臣光則知守尚書令即此人而守尚書令丞則非也漢書凡守之貳謂之守丞陳勝傳守令不在獨守丞與戰譙門中令之貳謂之令丞此守尚書令丞即臣非一人官銜索隠以尚書令另讀而謂史闕其名誤施易史衛綰傳劍人之所施易獨至今乎施讀為贈施之施詩豉反言平交相贈惟劒為易何獨能畱至今如淳司馬貞顔師音移音亦之解並非生平毁程不識史魏其武安列傳夫無所發怒乃罵臨汝侯曰生平毁程不識不值一錢今日長者為夀乃效女兒呫囁耳語言我目中素無程不識今爾值我為夀乃與程耳語而不顧我是知有程不知有我矣口中雖罵賢意中兼罵程不識故田蚡云程李俱東西宫衞尉今衆辱程將軍仲儒獨不為李將軍地乎此語極隠隠帶刺時李廣為未央衞尉程不識為長樂衞尉未央宫乃衞天子長樂宫乃衞太后意言投鼠忌器已屬太后肺腑辱程即如辱太后及辱已夫目中無太后固不足言若程李同官類傷狐則辱程亦如辱李辱李亦如辱天子矣此語巧極惡極蓋不但挑程之怒且挑李之怒且挑在坐諸人之怒矣故夫直云今日斬頭陷匈何知程李乎言今日犯我者必與并命何知程李此語蓋已直著蚡身上故蚡遂怒云此吾驕灌夫罪言前按灌夫不竟益長其驕此己之罪爾此段寫當時兩人口角漸鬬漸𦂳千載如生注俱不詳仰視天俯畫地史同前武安言魏其灌夫日夜招聚天下豪傑壯士與論議腹誹而心謗不仰視天而俯畫地言不如彼即如此辟倪兩宫間幸天下有變而欲有大功臣乃不知魏其等所為俯仰二句道其謀畫時形狀而不詳其所言何事故曰臣乃不知魏其等所為辟倪兩句言伺候兩宫一有不諱即欲乘此生變蓋兩人無他罪止好結賓客一事遂巧砌成辭明斥其有逆謀而其詞若含若露若無風又若有影真以莫須有殺人尤巧極惡極令人不省死漢書霍光傳霍禹云令人不省死甚言不知上所以盡外我家之意死公季漢書襧衡傳祖慙乃訶之衡更熟視曰死公云等道死公者詈之之辭云等道言爾所云是何言蓋詰其所訶口角千載如新函令又崔琰傳以函令密訪于外函令言為教令而函封之不欲顯其事也白堊突面又徐庶傳為人報讎白堊突面被髪而走突即塗語音之轉俗語糊塗或作鶻突是也相分又邴原傳當以書相分言以書薦之使相契分也傷身又華佗傳傷身今小産也霍然又左慈傳慈入壁中霍然不見霍然猶忽然適適三國志注蔣濟傳濟亡兒數見夢於母道為泰山伍伯事母啟濟雖云夢不足􅏜此何太適適適與的同言夢中事雖未可信然何的的分明如此燥濕三國志駱統傳人人别進問其燥濕燥濕猶寒暄言人人以情意相接洽也逋峻三國志注趙達傳皇象幼工書時有張子並陳梁甫能書甫恨逋並恨峻象斟酌其間甚得其妙齎貸史貨殖傳齎貸子錢齎讀為質劑之劑津私切周禮大市以質小市以劑謂兩書一札同而别之長曰質短曰劑即今所謂合同齎貸子錢謂操劵以貸錢也注音如字不得其解白著通鑑唐肅上元二元載為度支鹽鐵轉運使以江淮雖經兵荒其民猶有貲産乃按籍舉八年租調之違負及逋逃者計其大數而徴之擇豪吏為令督之不問負之有無察民有粟帛者發徒圍之籍其所有而中分之甚者取八九謂之白著按白著謂流民不占户籍别于土著者故謂之白著此舉本以捜括逃亡逋負為名雖著籍不欠租者亦指為逃亡而取之故謂此等人户為白著以掩其掊克之迹也中宗中興之中舊音衆予嘗正其音為孟仲之仲仲居孟之次有再索之義中直用切興猶言再興也又古今帝王諡中宗者三人殷太戊漢宣帝唐廬陵王是也中字從來並讀如字予閱西嶽華山碑稱宣帝為仲宗頓悟中宗亦當作直用切蓋太戊脩成湯之政商道復興宣帝廢昬而立明廬陵革周而為唐皆有再興之義故皆號中直用切宗漢碑作仲蓋直用本字非借仲為中也洪适𨽻釋謂帝者廟號而借以他字不恭孰甚此習見經史皆作中宗竟未紬繹中字之義爾意錢梁冀傳注引何承天纂文云意錢一曰詭億曰射意曰射數曰持掩皆攤錢也按此即今之猜枚曰射曰意曰掩居然可見注引何語以為攤錢則李賢之誤也豢龍逢潛夫論云豢龍逢以忠諌桀殺之他書多作關龍逢予乃知關當讀為豢即古豢龍氏之後也若不讀潛夫論鮮不以關為姓以龍逢為名矣夜晴韓非子楚莊王伐陳吳救之雨十日夜星說苑載其語作夜晴按古文晴字作夝則知韓書乃後人傳寫之譌也雨國策蘇代云今日不雨明日不雨必有死蚌雨字無義按春秋後語載其事作兩陸佃埤雅亦作兩蚌開謂之兩且與蚌叶韻僕緣莊子人間世適有蚉䖟僕緣按僕當作䗱子六切傳寫之譌或古字通用䗱蟲集貌與本意相合諸註並非央瀆荀子入其央瀆注中瀆也今人家出水溝按左傳襄廿五規偃于建切豬注偃豬下濕之地規度其受水多少通雅方以智以為即今之陽溝是也愚繹其名央當即讀偃舜妃女英大戴記作女匽英匽一聲之轉其音可見瀆當讀為竇左傳襄三十晨自墓門之瀆入注音豆又偃豬當有二義本文書土田度山林諸句皆具二義豬為水所停偃乃其出水處今之暗溝後漢董卓傳潛從塢注與堰同下過軍謂之潛可知為暗度而所謂入其央瀆與自墓門之瀆入語益顯矣匽古堰字偃則借用字公琴水經注楚人謂冢為琴六安縣都坡中有大塚民曰公琴此臯陶冢也按冢之為鄭琴即鄭初聲亦如詩風之為分淒其以風叶實獲我心中之為簪騏駵是中叶騧驪是驂驂音參也又山海經百榖是生冬夏播琴此又以琴為種冢種一聲也小通韓詩外傳男八歲而齠十六而精化小通女七歲而齔十四而精化小通凡言後竅為大前竅為小小通謂其精通于前可以為人道也水經注摘其臯厭水虎之勢可為媚藥可以小使使字則本左傳昭二十五季姒云公若欲使余甯越吕氏春秋甯戚叩角而疾商歌齊桓公任之以政淮南子作甯越乃知戚當作戊蓋戊即古鉞字以音相近故借用越戚字則後人傳寫之譌也茹甕齊民要術造酒法云十月初凍尚煖未須茹甕十一月十二月須黍穰茹之按茹者以物擁覆取煖之名字書茹字無此義禮樂記煦嫗覆育萬物注以氣曰煦以體曰嫗當用此嫗字樓羅梁武帝風人辭城頭網雀樓羅人著又五代史南漢劉鋹謂李業曰君可謂樓羅兒矣樓羅似言儇利意又清異錄劉鋹令宫人鬬花角勝于殿中宦士抱關出入皆捜懷袖置樓羅以驗姓名又唐人酒令舉俗語云欺客打婦不當樓羅猶俗云不當要也又鄭棨詩一朝白雨下無鈍無婁羅此喻賢愚同盡之意以鈍與婁羅為對其義益顯蘆之碕吳越春秋漁父歌日月昭昭乎寢已馳與子期乎蘆之漪按越絶書馳作施音弋移切下乎作甫漪作碕施日斜也碕曲岸也二字義較確甫當讀夫音扶解愠阜財南風歌家語愠讀為藴藴烝暑氣也南風長養萬物故曰阜財火滅脩容武王帶銘大戴記火滅脩容慎戒必恭恭則夀按禮月令有不戒其容止者生子不備必有凶災火滅脩容語與此同蓋聖人節欲保身之㫖以銘于帶欲解帶時知儆也閱詩歸譚註此語可發一笑肉飛莋都彛歌詩紀昌樂肉飛屈申悉備昌倡古字通用肉飛狀舞者之態也昔人竹不如肉以肉字說歌此以肉字説舞並屬竒情兒母古樂府東門行云㧞劍出門去兒母牽衣裾蓋難正言其妻故曰兒母此與公羊傳哀六年常之母有魚菽之祭稱謂正同俗本作兒女非䋎豔歌行故衣誰當補新衣誰當綻古謂補為綻賴得賢主人覽取為吾組按組字當作糸旁旦乃古綻字古詩不嫌重押由傳寫者二字古今互出復譌而為組義遂不明曲曲字初聲乃匡字曲簿即蠶匡斗下六星曰文匡宫後人謂之文曲星此二字聲義相通之證又以曲調為腔調腔匡音同子夜歌碧樓暝初月羅綺垂新風酌酒初滿杯調絃始成曲此詩初疑其不叶久之始得其解不覺洒然窮袴晉無名氏樂辭愛惜加窮袴防閑託守宫窮袴字出漢書上官后傳師古注今之緄􅀈袴據此則古婦人袴不皆緄􅀈窮袴守宫皆防閑之具惟其愛惜故加防閑也此分裝對法又云今日牛羊上丘隴當年近前面發紅蓋女子幼時情事尚帶羞澁至盛年則不復然譬之丘隴牛羊所便其進前惟恐不速矣以其為上隴之牛羊此窮袴守宫之所不能已也僂傴僂力主切傴於主切俯身向前也此背曲之病莊子列御㓂篇作痀僂又字書僂郎豆切佝苦候切當即一義訓短醜貌未晰又左傳昭廿五臧㑹竊其寶龜僂旅句此亦以其形名之注龜所出地臆語又史記滑稽傳甌窶滿篝汚蛙邪即甌臾滿車汚邪下地則甌窶為髙地可知此亦以其形名之據莊子之痀僂則僂傴鉅僂吕佝鉅僂句鉅甌鉅窶吕皆當作此音以語有倒易字有通借諸書昧其義遂異其音通人閱此自當了然區區李陵答蘇武書區區之心竊慕此耳區區少意蓋指此心而言猶云方寸耳繁欽詩何以致區區耳中䨇明珠何以致叩叩香囊繫肘後叩叩猶區區此一聲之轉今人自謂曰區區蓋因少義而為自謙之辭言叩叩恰恰又因少義為無餘之義又扣除扣算皆無餘義也男紫女青虞初志載段成式鬼與温庭筠書中有男紫悲黄女青懼綠之語按升菴集男青木名見羅浮山記女青亦木名見道藏有女青鬼律據此似以樹木憔悴喻人命將盡之意而男紫不可解豈即所謂男青乎本草蒙筌云蛇含草其根名女青帶之則疾癘不犯主蠱毒而逐邪惡殺鬼魅以辟不祥傻角西廂劇中紅娘呼張生為傻角傻沙瓦切解者以為輕慧貌非也觀其口語本以醜稱相調若云輕慧則是美辭非醜辭矣予推其意當用􅀈字􅀈面醜也音正與傻同酩酊酩酊二字古所無世說茗艼無所如蓋借用字今俗云懵懂即茗艼之轉也又列子眠娗諈諉張湛注眠娗不開通貌詳注義則眠娗當即讀茗艼欸乃欸倚亥切俗作款非欸乃舟人節歌聲本有聲而無字詩家因取字音相近者書之如元結柳宗元作欸乃劉言史則作曖迺劉蛻則作靄迺是也自山谷誤讀柳集註以欸乃作襖靄音今人悉踵其譌不知柳注云一本作襖靄者此特指欸字而言謂此字亦作襖亦作靄正明借字寓聲故無一定之字豈以襖靄音欸乃哉見詤吕氏春秋知接篇瞑者目無由接也無由接而言見詤本註詤讀誣妄之誣篇海虚光呼晃二切夢言也按此即古之謊字虚言曰詤呼光切此言瞽者目不見物常疑人言為虛故曰見詤髙誘即讀為誣亦太從便矣盧牟淮南要略訓原道者盧牟六合混沌萬物注盧牟猶規模也此依俙億度之辭按盧牟皆六博采名博齒分黑白二色黒曰盧黒而刻犢于上曰牟此假物為辭即混沌之意蓋溯道于未有天地之始初無朕兆可見故云云下文象太乙之容測窈㝠之深以翔虛無之軫意益明矣蕉鹿列子周穆王藏諸隍中覆之以蕉蕉樵古字通用取薪曰樵謂覆之以薪也莊子人間世死者以國量乎澤若蕉字與此同謂死人骨如積薪也今以蕉字為芭蕉用而相如子虛賦但作巴且指奏淮南子齊俗百家之言指奏相反又要略指奏卷異各有為語指奏即旨趣古音近通用鴈鼎韓非子齊索饞鼎魯以其鴈徃齊曰鴈也魯曰真也鴈當讀為偽古字音近而借用也古為讀如訛詩我生之初尚無為叶尚寐無訛又古之所謂鴈即今之所謂鵞疑古鴈正作鵞音則鴈偽之聲可通轉矣阡陌晉帖不審謂粗得阡陌否猶言得其梗槩也支牀有龜庾子山小園賦坐帳無鶴支牀有龜出神異經云南方老人以龜支牀行二十年老人死而龜猶活舜梧堯柳四六中有舜梧堯柳之語言其土地之廣逺也梧謂蒼梧舜巡守所至柳字頗僻堯典宅西曰昧谷禮記鄭注引伏生尚書作柳谷舜梧堯栁四字甚竒池魚林木城門失火殃及池魚楚國亡猿禍延林木今俗多稱此四句不知本侯景反時東魏移梁檄文中語然此語又出淮南子云楚國亡其猿而林木為之殘宋君亡其珠池中魚為之殫故澤失火而林憂廣韻池字註乃造池仲魚姓名而引諺云云宋初修書諸儒之陋如此何異唐之註文選者以芋為著毛蘿蔔乎踢嬲世說和嶠踢嬲不得休方言揚雄妯擾也嵇康絶交書嬲之不置注擿嬈也踢嬲即妯擾即擿嬈關關以木横持門户也魏侯生隱為夷門監故自言嬴乃夷門抱關者杜甫詩留歡上夜關言鍵戸留客也注者不知或改為卜夜闌陋甚闌字出韻王維亦曰應門莫上關應門司閽者也杜應門亦有兒應讀平聲或謂之當關嵇康書卧喜晚起當關嬲之不置千字文千字文為童蒙習熟之書然作者初本集字而成綴屬匪易其間故實頗衆即老師宿儒卒然致詢莫辨由來如金生麗水出韓非子荆南之地麗水之中生金劍號巨闕見吳越春秋歐冶子作五劍一曰純鉤二曰湛盧三曰豪曹四曰魚腸五曰巨闕甲帳對楹出前漢書東方朔傳推甲乙之帳右通廣内出三輔黄圖叙建章宮之制云其西則廣中殿受數萬人左達承明出班固西都賦承明金馬著作之庭故下文云既集墳典亦聚羣英也鴈門紫塞出古今注秦築長城土色皆紫故稱紫塞鈞巧任釣出三國志魏馬鈞巧思絶世事見本傳及莊子任公子投竿東海旦旦而釣丙舍傍啓見嵇康難自然好學論云以虛堂為丙舎鍾繇帖有墓田丙舎語丙居甲乙之次疑為小舎之稱雞田赤城見梁元帝職貢圖贊遐哉鳥穴永矣雞田又唐書李光進傳雞田西北塞外地名化吕氏春秋云紂剖孕婦欲觀其化化字甚新蓋指腹中未成形之胚胎也按大戴記云男十六然後情通然後其施行女十四然後其化成又淮南子云衆雄而無雌又何化之能造乎義並同此又人死亦謂之化孟子且比化者無使土親膚莊子無怛化腹中之化化無而之有人死之化化有而之無也二言劉勰文心雕龍云二言肇于黄世竹彈之謠是也事見吳越春秋未必果黄帝時詩此言未知詩理蓋斷竹續竹飛土逐宍必四言成句語脈𦂳聲情始切若讀作二言其聲嘽緩而不激揚恐非歌㫖若昔人讀黄絹幼婦外孫虀臼成二言四句此實妙解文章之味又古文八字用四韻者老子知足不辱知止不殆韓非名正物定名倚物徙是也古諺二字中藏韻者國語為虺弗摧為蛇將若何列女傳力田不如逢年力桑不如見國卿是也又有一句中自叶韻者後漢諺云前有趙張三王後有邊延二君是也載考古有一言為韻者管子云宫如牛鳴窌中商如離羣羊角如雞登木徴如豕負覺而駭羽如馬鳴野以至武王硯銘云石墨相着而黒此則前人未之言也波瀾杜甫贈鄭諫議詩波瀾獨老成又劍器行序云既辨其由來知波瀾莫二今人喜用波瀾老成字而不知所謂波瀾者何義按波瀾即淵源也謂鄭詩獨有前輩淵源李舞淵源公孫竟似一人也緣唐諱淵字故以波瀾易之謻簃栘謻陳知切别也張衡東京賦謻門曲榭謂别門也簃延知切樓閣邊小屋與樓閣相連者又移中監漢官名蘇武嘗為之予按此數字當即一音延知切一義蓋是樓閣邊小屋以門言則曰謻門指其處言則曰移中苐諸書用字各異故不知合為一字耳又􅀈延知切氷室門諸書多以此訓混入謻字非庯庩集韻庯庩奔模切都二切屋不平也詳音訓庯庩猶坡陀山勢凌遲曰坡陀屋勢凌遲曰痡庩有轉聲而無異義也屋庯庩則其形峭麗故人之有風儀者目為庯峭魏收云庯峭難為是也後通用波俏字或單用俏俏或又借樵七肖反唐朱隋侯李逖爾朱九三人並姿相少媚廣州人謂之三樵少女風今人詩文相承用少女風此出管輅傳兌為少女位西方此謂風從西來耳近閱典籍便覽少女風注將雨初來微風也又少男風注將雨至急風也考輅傳輅言樹上已有少女微風樹間又有陰鳥和鳴又少男風起衆鳥和翔其應至矣須臾有艮風鳴鳥云云少男為艮則少女為兌可知而便覽所注如此其陋甚矣將無同王夷甫問阮宣子老莊與聖教同異對曰將無同將無者然而未遽然之辭謝太傅云將無歸晉人語度舒緩類如此後人妄意生解總由不悉當時口語耳茗柯劉尹茗柯有實理注柯一作朾又作仃又作打予謂此當即襄陽人歌山簡之茗艼茗艼即酩酊復轉聲為懵懂皆一義此云茗艼有實理言當其醉中亦無妄語恨傳寫訛誤其義遂晦近時一名公乃以茗柯為號想定讀如字二字有何深趣而貽識者以不學之譏耶名命天生劉伶以酒為名古名命二字通用謂以酒為命也孟子其間必有名世者漢楚元王傳作命世此二字通用之證傾仄水經注渭水下云崩巒傾返疑是傾仄仄誤為反反又誤為返耳摻撾禰衡為漁陽摻撾鼔字書摻七勘切引禰衡事又所斬切擥也引鄭風摻執子之袪擥魯取切撮持也說者謂摻為三撾鼓兩手弄三杖且弄且擊故字或作參七紺反俗謂三棒鼓兩頭撈蓋出于此詳且弄且擊之狀正與撮持訓合則摻字當音七勘切為正六鼇巨鼇戴山事出列子字書皆以鼇為大鼈按本書云一釣而連六鼇合負而趣歸其國灼其骨以數焉然則鼇者龜也非鼈之大也九德莊周引聲歌古今樂錄云天地之道近在胸臆呼吸精神以養九德九德字未見所出惟三國志注管寜傳應二儀之中和總九德之純懿又郭璞山海經圖贊云九德之氣是生長乘所謂九德似指四象五行人身中亦有四象五行故曰天地之道云云金石錄趙明誠堂谿典嵩髙山石闕銘趙氏云蔡邕傳注引先賢行狀典字子度而延篤傳注又作季度今此碑乃云字伯并當以碑為正詳其名典則字宜從法度之義按度字古文有作者此并字似因此而訛趙但知以碑正史不知此字又賴史以正碑也㑹稽東部都尉路君闕銘諸闕銘見於錄者必二蓋立二柱以表兆域禁樵牧之意此闕造於永平明帝年號時東漢諸碑無先于此者其上但分題所歴之官未嘗著文字如武陽功曹王稚子武氏諸闕皆然武闕但有附敘宣張數語蓋惜其蚤夭而附著之後來踵事増華因立碑石以紀述功德則遂以碑代闕矣右益州太守髙頥則既有闕又有碑此其制益侈總之本非國家有定制故也韓明府孔子廟碑爵鹿柤俎梪豆籩柉禁喜壺趙氏云據字書柉木皮可為索喜陳樂也亦非器名皆不可曉喜字洪氏以上下文叶韻知為壺字而柉音汜亦止據本訓木皮可為索予按此數句皆說禮器一字一物無緣贅此一字考韻㑹杫斯義切引方言俎机蜀漢之郊曰杫此柉字必是杫字非筆誤則借用耳四皓神位刻石四皓之園公此石作圏公洪引圏稱陳留耆舊傳自序云圏公為秦博士避地南山惠太子以為司徒至稱十一世此刻有圏公神坐及神胙几則圏公蓋亦有所據趙亦引圏稱自序圏公之後云云得四皓刻石知稱所述非臆説但謂圏公為秦博士及後拜司􅑫者疑無所據是二君並引稱序以證此刻又因此刻而益信稱序也予謂博士司徒之說誠屬妄誕趙初疑其妄誕後得此石而信蓋因圏姓極為希僻而園字形聲並近遂冒認四皓為鼻祖妄稱公爵以為門祚光豈知即此二字自顯其逗漏耶又王邵陳留志以為園公姓唐名秉字宣明四皓各有姓名邵與稱不知時代孰先後但同述陳留郡人物不應兩相牴牾如此按史記索隠注謂諸人姓名乃王劭據諸家世譜為說予因悟六朝人崇尚譜牒妄引古人以自重爾夫園公之為園也唐氏且竊祖之矣况形聲相近之圏又何足怪故予斷此石刻亦即圏氏所偽造意在欺後世以售其妄今趙氏亦云驗其字畫是東漢時書益自信其說不謬𨽻釋洪适濟隂太守孟郁脩堯廟碑洪氏未盡釋者摘釋于下後倣此赤精之胄為漢始别漢自以劉姓為堯後而又推本于赤帝以赤帝為始祖而堯為别祖故曰赤精之胄為漢始别陵氣炎煴炎字當是烟字烟煴與氤氲同古文烟作乾川見徴漢碑多以川為乾坤坤字無作坤者易曰坤者順也順諧川聲而川又諧紃馴諸字疑古坤字作川音假借用之闚極道之要妙篆文妙作紗本訓精微之意易神也者妙萬物而為言者也老子常無欲以觀其妙又𤣥之又𤣥衆妙之門正得本訓後遂以妙為美好之稱張衡西京賦妙材騁伎曺植七啟才人妙技繁録上太子牋天壤所生誠有自然之妙物故􅘗字變從女石闟榻二坐昭配帝設二石坐以配堯赤帝也關綜雅蓺通洞運度雅蓺謂六經運度謂七緯攷緯書之名易有乾坤鑿度書有運期授詩有推度灾春秋有運斗樞東漢好尚讖緯故其言如此為藜元來福及首段􅀈招真祥萬疑是福字是來二來疑是是求字傳寫之誤首段數語用韻來字上叶休下叶秋其為求字無疑本繼於姃姬相土譯擇居􅀈疑是末字紀祖􅀈所出􅀈即引字偏旁互易􅀈報帝堯碑宜崇禃濯禃字疑是祗字祗濯猶齋沐也王子喬碑祗濯之敬肅如也或誤作祠濯蔡中郎集遂改為祗懼之敬語意殊為重複魯相史晨祠孔廟奏銘汁叶光之精大帝所挺承敝遭衰黒不代倉此碑多主緯書立説黒帝名叶光紀以孔子為黒帝之精周為木德孔子生值衰敝之運水木不相代故不有天下但能作經以垂後而已獲麟疑輒字作到官行秋饗飲酒畔泮宫畢復禮孔子宅拜謁神坐復禮之日闕而不祀又饗孔廟後碑亦云春秋復禮無公出享獻之薦薦此因秋饗禮畢謁孔子舊宅而無其祀故奏尚書乞舉公祀但不知何以謂之復禮恐是孔廟既有成侯四時之祀而此復行春秋饗禮而祀之故謂之復禮但因王莽之亂其制寖失空存其名耳不能闡弘宏德政恢崇壹變此用魯一變至于道之語樊毅脩華嶽碑窄自古泰山邴邸邑邑由與猶同哀此勤民獨不賴福乃上復十里内工商農賦克厭帝心嘉瑞仍􅀢風雨應時洪氏謂此碑多誇如復十里内工商農賦夫以祠祭勞民養牲費槀為農乞復租筭可也工商何與焉按奏復田租口筭碑内有役費及調發等字則不苐有費而且有役工商無田租而有口筭安得謂此事無與又云上奏復賦克厭帝心則知巳從其請所謂帝者蓋指西方白帝讀上下文自知洪誤以為當時人主謬甚泰氣㢕秴疑是害字􅀈氾孫叔敖碑霆堅禹稯謂庭堅禹稷庭堅即臯陶也􅀢疑矢字􅀈疑絃字節髙義即狷字㬆暝戲即羲皇帝代龜龜唐公房碑從為御史鼠齧䡊即轓字車被鞁具轓車太守所乘車鞁車駕具也癘蠱不遐瑕去其螟􅀈數句皆言唐公靈響福䕃一鄉之意詩不瑕有害言無害也此言癘蠱不為灾而用詩語又以遐為瑕甚不易解濟無極山碑復使髙遷俱諸太常為無極山神索灋食比三公山法食于法得食也即祭法所謂社稷山川之神有功烈于民及九州名山川澤所以出財用者但出自巫祝之言故作此俚語􅀢叅􅀢疑危字曲楙與茂通迡遲増益吏役恭供君下職下謂神降其身而使之傳言増役以供此職即巫者也前言神即使髙傳言云云蓋髙即其人泉衆字疑筆誤多子孫白石神君碑抱挹字疑筆誤損相縣謂國相及縣令也廣漢長王君治石路碑功夫九百餘日功夫即今俗所謂工夫不知漢人已有此語桂陽周府君功勲銘􅀈睦臚艫不相知銘中又云􅀈老唱兮臚人歌􅀈臚即􅀈艫然字書無􅀈字郭璞江賦舳艫相屬注舳船後持舵處艫船頭刺棹處此文亦似言舟行失利前後不相知而􅀈與舳形聲並逺無緣假借哀疑舟字人困戹䧢陭即嶇﨑硍􅀈即相如賦之浪礚槀長蔡湛頌七典即七經漢人以論語孝經與五經而七梁相孔躭神祠碑㭊析離慈仁質桷與慤通故舞魂構魂構即神祠也漢成陽令唐扶頌夷粤抪㨭洪音布戸不順理也予謂即跋扈耳髙祖受命興於漢中道由子午出散入秦建定帝位以漢詆焉石門頌歐陽公集古錄謂詆字未詳愚意詆字其旁疑從氏詆或即諡字謂髙祖由子午道入秦以其興于漢中故遂定有天下之號曰漢諡猶號也巴郡太守都亭侯張府君功德叙此巴郡太守張納碑首行作此十三字漢碑大抵敘述功德然惟此碑首行有此題目他碑無之他碑類有篆額洪氏釋文必著之此碑獨不言有篆額意即識以首行十三字當時碑刻固無一定之制也又漢人勒文字于石通謂之碑而其題目間有不同如益州太守修周公禮殿記則謂之記魯相史晨祠孔廟奏銘又亳州苦縣老子銘桂陽太守周憬功勲銘郯令景君闕銘則謂之銘司𨽻校尉楊君石門頌李翕析里橋郙閣頌槀長蔡湛頌成陽令唐扶頌則謂之頌謁者景君墓表則謂之表記者紀其事敘表銘頌皆述其功德然銘頌之先未嘗無敘敘表之末未嘗無銘其體俱不甚相逺霜月之靈皇極之日韓敕造孔廟禮器碑霜月為九月皇極為五日人多知之但下句本術家太乙行九宫法是日太乙在中宫故曰皇極日也此等用字法實六朝文字浮靡之濫觴故歐公集古錄中極口訶之以為東漢文章衰薄其筆力辭氣非出自然如霜月皇極是何等語西嶽華山碑後云京兆尹勑監都水掾霸陵杜遷市石遣書佐新豐郭香察書歐陽叔弼以為郭香察所書洪景伯非之曰東漢無二名郭香察書者察莅他人之之書爾蓋勒石本前守袁逢之意而成於後守孫璆是時袁已遷為京兆尹故遣郭察視書碑洪說是也詳此則本文必袁所自撰以不在郡故令人撿挍恐書者有誤爾中遭元二西虐殘橋梁斷絶石門頌趙氏洪氏並引後漢鄧隲傳時遭元二之災注元二即元元古書字當再讀者即下為小二字石鼓銘凡重言者皆為二字明驗也後人不曉遂讀為元二或同之陽九或附之百六良由不悟致斯乖舛趙謂此碑中遭元二云云若讀為元元則不成文理疑當時自有此語漢書注未必然洪又引孔躭碑云遭元二轗軻人民相食若作元元則下文不應又言人民漢注之非明矣顧復引論衡云今上嗣位元二之間謂即元年二年以證鄧傳所云亦謂元年二年鄧傳云永初元年夏凉部畔羌搖蕩西州詔隲將羽林軍五校士擊之冬徴隲班師迎拜為大將軍時遭元二之灾人士荒饑盜賊羣起四夷侵畔隲崇節儉罷力役進賢士故天下復安予詳上下文意亦宜云元二之間始與論衡合今顧云時遭元二之灾則決非元年二年之謂審矣按陽九百六之說洪容齋續筆云其名有八初入元百六曰陽九次曰隂九又有陰七陽七陰五陽五陰三陽三皆謂之灾歲大率經歲四千五百六十而灾歲五十七以數計之每及八十歲則值其一疑所謂元二者即入元之二㑹當所謂隂九者爾東漢讖緯之說盛行元二之灾正當時常語李賢何故力闢之景伯雖知李賢注謬而曲引論衡亦魯衞之政何不證以乃弟續筆之說耶洪氏云司𨽻校尉楊君厥字孟文水經及歐趙皆謂之楊厥碑蜀中晚出楊淮碑云司𨽻校尉楊君厥諱淮字伯邳大司𨽻孟文之元孫也始知兩碑皆以厥為語助此乃後政頌其功德故尊而字之不稱其名又考華陽國志楊君名渙觀此則考訂之詳歐趙不及洪逺矣緣崖鑿石處隠定柱改解危殆即便求隠郙閣頌隱字古作穏字用杜甫詩安隠髙詹事是也縁崖鑿石所以安横木而就穏處立柱言初造棧道之事也改解危殆即便求隠即指下文析里大橘於乃造又醳散之嶃漯從朝陽之平慘減西髙閣就安寧之石道數句謂去髙就平以求安穏此改造析里橋及郙閣之事也古即借隠為安穏字歐趙洪皆無說豈當時通曉所謂耶此碑字句多缺歐錄刪節令可讀然以𨽻釋較之則於乃造誤作於爾乃造即今字歐誤作尒字醳散關之嶃漯誤作醳㪚關之􅢉漯漯即溼字嶃漯對下文平慘其語本明從朝陽之平慘作徒朝陽之平慘自謂本非刻畫譌謬而莫詳其義疑當時語與今異又疑漢人用字簡略假借不同蓋歐於鈎索考較之事本非所長其好收輯碑刻者意欲藉以正史𫝊之誤蓋但觀其大意而已探賾索隠固有所不逮也衡官掾下辨仇審下辨似是地名後又云故吏下辨子長趙洪皆不釋二字時衡官仇審字孔信從史位字漢德為屯頌故吏下辨子長書此頌時石􅘄南威明此數行在年月之後載撰人書人及石􅘄即師字姓名他碑未有若是之詳者當時勒石之意本欲附其名以傳後不意姓名恰當缺處而作頌之漢德書頌之子長尚存其字猶為不幸中之幸也前地里武郡有下辨道鐉燒破析西狹頌字書鐉此緣切門鉤也一曰治門戸器然此句本言燒鑿山石令為坦途與本訓殊逺愚意當是鑽燧鑽字漢碑用字多從假借或以鐉為鑽亦未可知洪趙皆引本文而不說此字從掾位張納碑隂掾屬題名凡七十餘人内有從掾位四人似是試職而未即真之稱郙閣頌後有從史位亦此類也好學劉熊碑隂碑隂載本縣官紳吏士出錢之數洪氏云處士之後有好學四十餘人必泮宫之後進以處士為丈人行者按劉君在縣務脩教化故碑中有帥􅀢後學致之㢕泮等語好學之目甚新四王廟孫根碑釋文比干墓在衞州汲縣俗立三仁像併商紂謂之四王廟以四月四日為比干誕日祠具甚盛夫比干廟立三仁像宜矣却攜帶商紂亦得血食或曰却是商紂攜帶三仁不然父師少師三公爾非商紂安得並膺王號耶一笑大抵俚俗侗而且愿其心止知徼福不必其所祀之果合祀典與否君臣並祀且不可况因臣以及其君耶况因比干以及商紂耶鼻天子之祀唐人毁于道州明人復祠于貴州俚俗之不經豈啻一四王廟為然恥與鄰人羼並拾驅譙敏碑洪氏云說文羼音剗羊相厠也拾音洽劍柙也此句蓋是不與羣奄冠劍並驅之意愚謂漢碑用字多隨意假借及贅寫偏傍此恐即以拾為合羼並言混處合驅言競逐也童子逢盛碑據碑言逢童年僅十二歲在古為下殤而為之立碑季世之敝極矣考蔡中郎集亦有二碑其一袁滿來年十五歲一童幼胡根僅七歲爾惠聰􅀈字似是敏字制中􅂒􅭠洪釋作模笵􅂒字從无為聲字書俱未收故因􅀈德以示來𦙍􅀈字洪不釋為何字意其讀顯耳予疑是誄字周禮大祝六曰誄鄭注積累生時德行以錫之命主為其辭也誄字一作􅀈此碑􅀈字必因􅀈而作又徐陵玉臺新詠序萬年公主非無􅀈德之辭􅀈德即累德也維兮張賓公妻穿中題柱題柱二所每首有此二字洪氏以為猶嗚呼之類凡祭文首必以維字發之若長曳其聲即兮字出矣然他碑並無此二字獨此有之甚新鄭子真宅舎殘碑此碑殘缺殊甚推求字句似某甲死無嗣而立一繼嗣其祖之傅婢有子蓋嗣子之庶叔求分其祖所遺財物訟之於官官為估直其財産為分析以平其訟因立此碑以杜後日之爭爾因前有故鄭子真地中起舍一區又云故鄭子真舎中起舎一區蓋本其所從來與下文潘蓋樓舎吕子近樓一例後人遂題以鄭子真宅舎殘碑乍閱似若鄭之子姓有此事者子真當時髙士爭財事極鄙薄而猥冒其名何古人之不幸耶金廣延母徐氏紀産碑此亦家庭分析瑣屑之語與前碑所紀同極鄙細而勒之碑版與諸碑並夀真可笑也都鄉正衞彈碑洪氏考前食貨志注及衞宏漢官舊儀知此係守令為民均徭科例而民頌其功德之碑志注云更卒謂給郡縣一月而更者正卒謂給事都官者漢儀云民年二十三為正一歲為衞士一歲為材官中謂京師都官謂諸官府之役此對郡縣而言此碑額云都鄉正衞彈碑正謂正卒衞謂衞士舉正卒以見更卒舉衞士以見材官都謂中都鄉謂郡縣彈者糾正其事改力役為僱役此碑之所由立也趙氏目為都鄉正街彈景伯已刋其誤近方桐山偶見周禮注之街彈室遂引金石錄為證而謂水經隸釋並誤作衞由未見周禮注此蓋先入鄭注為主特喜趙氏街彈二字之合故雖洪氏引據如此之詳而亦不之審也又按洪氏引劉熊碑云愍念烝民勞苦不均為作正彈造設門更以為與此碑合然二事又自不同劉碑下云富者不獨逸貧者此處缺當是不獨勞三字此不論貧富以身值役挨門遞更也此碑云臨時僱募不煩居民乃令民出錢官自募人正是宋時差役僱役二項在漢時則各聽郡縣之便朝廷不為一定之例耳君諱寔字仲躬太丘長陳寔壇碑隸釋云諸書皆字陳君曰仲弓獨此不同殆是借用予謂不然躬者寔有其德於身也陳寔正當字仲躬他書借用弓耳三命縮嬴仲秋下旬碑三命即援神契所云命有三科有受命以保慶有遭命以謫暴有隨命以督行觀上下文云爰兹衰微三命縮嬴悲彼幽㝠語自可見洪氏以嘗選貢釋此句謬甚又祝長嚴訢碑云經設三命君獲其央殃語意益明見金石錄隸釋無前碑歍歑􅥒哉即嗚呼哀哉琴曲水仙操歍欽傷宫仙石當作不還以此碑證之欽字必歑字之誤漢初平五年倉龍甲戌益州脩周公禮殿記惟永夀二年青龍在涒灘魯相韓勅造孔廟禮器碑凡言青龍倉即青在某干支者是紀歲星所在歲星為木星故以青龍目之國三老袁良碑玉具劍佩書刀繡文印衣無極手巾各一印衣印囊也無極手中不知何物疑織綺作萬夀文無極蓋影萬夀字爾燉煌長史武斑碑劉向辯賈之徒辯辯字恐讀為班謂班固也平都相蔣君碑光光洸槁槁矯蓋用詩之武夫洸洸及矯矯虎臣耳孔謙碣􅏊體蘭石自然之姿按靈臺碑體蘭石之操帝堯碑性發蘭石生自馥芬似言蘭之香石之堅皆其性自然如此也泰山都尉孔宙碑於弁借為變時廱書黎民於變時雍此以弁為變因聲近而借用也黎儀以康黎老人也儀與倪通小兒也費鳳碑亦有棃儀瘁傷語山陽太守祝睦後碑七政錧鎋佐輔什協樞漢人解尚書有以七政為北斗者祝為尚書僕射故云輔謂三公樞謂尚書輔之協之僕射之職也衞尉衡方碑化速􅗯郵馹不虞吳不陽揚旌命􅟨借為委任金鄉長侯成碑叡精謙界虛同盟必畢通至淳于長夏承碑轓軒六戀轡飛躍臨津􅄇日則月皓與昊同天不弔韯殱此良人太守車以朱塗兩轓轓軒指此言政聲流聞不日當擢太守如龍之飛躍已臨水際不意其身遽殞也故民吳仲山碑此人蓋隠居不出而布惠州里者後人感其德而碑之目曰故民似是官中所立而不書立碑之人不可詳也節度無隻借為雙出入遨詳翔徦假舉收襜瞻北軍中侯郭仲竒碑焉于之武以抑於疆董安于為趙上地守嘗云使吾法如入澗必死民誰敢犯此用其事而以焉為安也𤣥儒先生婁夀碑栖􅜃衡門字書徲杜兮切􅜃延知切按揚雄賦靈遟􅂒注音栖遲說文􅊂古夷字此作徲􅜃即揚賦之遟􅂒即詩之栖遲洪氏但以本音釋之疎矣繁陽令楊君碑徲伲樂志此栖遲又作徲伲益信􅊂夷本一字也堂邑令費鳳碑黔民作鹵鹵古字虜鹵通用此从鹵為形而其首實存虜之半亦巧於制字者黔與黥通此即今奸棍掠賣男女之事古以俘獲所得者為僕妾故謂之虜黥其面使不得逸也巴郡太守樊敏碑貫穿道度無文不睹緯書有乾鑿度之名鑿古一作􅂒此道字疑􅂒字之誤濯擢冕提網謂辟為長吏也欲救民德彌大兮當遐秊今遂逝兮歍嘑􅥒哉魂神兮數語全同列女傳柳下惠誄蓋勦劉子政筆又魏大饗碑其餘十餘行語意多襲班固燕然山銘生撏活剝之病此時已濫觴矣梁相費汎碑延究冒眉耇夀小篆夀作此隸書從省非耇字也太尉楊震碑靡惡􅄇形刑漢碑形字多作刑此正用刑字反作形殆有意混借者真不可解桐柏淮源廟碑泫二淮源泫二疑借混混音滾用孟子原泉混混意後又有晝夜句必是不舎晝夜益可証泫泫之為混混也掖夜韓勅廟碑以什言教伏羲作十言之教曰乾坤震巽坎离艮兌消息見左傳疏張公神碑勲炃薰芬孔廟置百石卒史碑祠用衆疑借為中牲衆牲字不可解疑當讀衆為中仲蓋少牢一曰中仲牢衆牲猶中牢也張公神碑祭以中牲蜀郡太守何君閣道碑雲此碑刻於建武之世僅五十餘字所紀閣道用功之數暨畢功歲月及太守與主吏姓名而已蓋碑刻之萌牙故簡質如此按光武以建武三十二年為建武中元元年此蓋惑於讖緯術數之說復改其元意在延期永命耳宋莒公引梁武之中大通葉少藴引王莽之始建國天鳳上戊以為與此一例洪景伯則以為殆莽漢之際習俗相尚以即位初元冠於新厯之上故此碑有建武中元之文漢志亦采取一時失於筆削爾不知此蓋始自漢文帝以十七年為後元年蓋因新垣平言日再中故再改元以應之是時未有年號年號始漢武帝所以但謂之後元年如光武既有年號故曰建武中元元年此是四字年號蓋言建武之中元爾梁武之中大通雖效尤前事而以中字冠大通之上其意較明宋公雖引此事為例而說之不詳洪氏之說更為顢頇總之不知意在延期永命故為此爾予猶以為中字當讀為中興之中仲中元猶再元也析里橋郙閣銘路當二州經用䘢湿湿縣士民或給州府按武都郡有沮縣此文二沮字下句義明上句不可解疑䘢本紵字沮本組字後云常車迎布歲數千兩即是此事水經注王子雅碑淯水南道側有二石樓相去六七丈欒櫨承拱雕簷四柱窮巧綺刻妙絶人工題云蜀郡太守姓王字子雅南陽西鄂人有三女無男一女築墓二女建樓以表孝思按墓上石樓蓋即今石牌坊又謂之牌樓古宫廟及墓門立雙柱者謂之闕其上綴以飛簷罘罳者謂之連闕曲閣此立四柱而雕刻竒妙更加華侈想當時無一定之制有力者得肆意為之耳光尼和碑符縣長趙祉遣吏光尼和以永建元年十一月詣巴郡没死成濡灘女終年二十五歲乘小船至父沒處哀哭自沈至日父子俱浮出江郡縣上言為之立碑以旌孝誠按入水求父屍事人知有曹娥而不知有光尼和之女終據曹娥碑事在漢安中漢安與永建並順帝年號相去不過十七八載然一在蜀一在㑹稽相隔數千餘里其事不約而同誠罕聞也水經注並載二事而曹娥獨著豈非以碑有三絶之稱為人所寶愛故耶𡨕通記冥通記乃陶貞白記其弟子周子良得仙之事首撰周傳後並周疏與諸真問答之語六朝人手吻奥别聊為疏之投永寧令陸襄陸仍送憩天師治堂而子良已寄治内住按道家以符法禁治鬼神故名其所居為治劉敬叔異苑云錢唐杜明師夢有人入其館是夕靈運生家送靈運于杜治養之是也忽未中寢卧彌淪良久乃起出彌淪謂魔寐不寤也道義謂同事道法之義友婁羅别作覼縷猶言委曲也言夢中事委曲不能的知其故薰陸香即乳香也瓦盆中已被水湯無氣湯讀為盪徒朗切以水滌器也以上周傳道子言在道家為弟子約尺壓書尺也一五尺安北壁一方五尺安牕下當時呼牀為五尺予時自覺起對分明而人見身猶卧􅀈􅀈不自解字書無􅀈字疑當音哄胡孔切夢魘鼻中作聲也塸與甌同角家謂風角家也後漢郎覬傳注風角占四方四隅之風以斷吉凶也卜葬法有方隅時日禁忌周信其術故云過未申酉嵗乃更議勿令小兒輩逼壇靖注門是前中隔閤靜屋及壇在閤外按靖即靜壇與靜皆道家奉經脩事之處於時子良􅀈屐横在牀前􅀈洛官切聚也擇也此似是脫屐之意用􅀈字不知何義恐是二屐交搭故為聚意也細書一大度麻紙滿度待洛切今人以横展兩臂為一度諸記中徃徃有黵易字黵都感切以墨滅字也勿甲乙告之甲乙猶次第謂不須一一告之也卿姨屢有􅣢請後云姨母乃密營􅣢為條疏作辭牒令周共奏請字書􅣢古胃切與䞈同賭也資也此云􅣢請當是以財物事神求福之義詳其意亦當即賄字爾周登向姨母道如此登登時也登之開聲為當蓋言當時也集異記薛用弱登令召至又登言於醫當以不能固節取命兼挫辱於神鬼故也謂其姨母不能以死持節强就配偶兼産子惡露觸汚鬼神與兩小兒竟夕􅀈檔韻㑹作摒擋卑病丁浪二切從手此從木或傳寫之誤本作屏當屏併也當妥也謂料理什物併疊使穩當也世說祖約料視財物客至屏當未盡又云為曹夫人併或作此字當筐篋畔等數人乏糧畔等猶同伴畔字隨手所書爾戴屋蓋屋也年内多勞扇削鬼神三官中奏爾多罪扇謂蔽翳之也削謂侵削之也按齊民要術賈勰云榆性扇地其隂下五榖不植即此扇字周于是年起屋或犯鬼神所居故云扇削靜櫺即前所云壇靖之靖櫺牕櫺也輔病頰病也義府卷下
